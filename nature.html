<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>疗愈空间 · 真实自然版 · 360°</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080c08;font-family:'Noto Serif SC',serif}

#glc{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;touch-action:none}
#glc:active{cursor:grabbing}

/* Loading */
#load{position:fixed;inset:0;z-index:300;background:#080c08;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;transition:opacity 1.4s}
#load.out{opacity:0;pointer-events:none}
.l-seal{width:72px;height:72px;border:1.5px solid #1a5a2a;display:flex;align-items:center;justify-content:center;font-family:'Ma Shan Zheng',cursive;font-size:1.05rem;color:#2a8a3a;line-height:1.5;text-align:center;animation:sp 2.4s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.4;transform:scale(.94)}50%{opacity:1;transform:scale(1)}}
.l-bar{width:150px;height:1px;background:rgba(60,160,70,.15)}
.l-fill{height:1px;background:linear-gradient(90deg,#3a8a4a,#5ab46a);width:0%;transition:width .3s}
.l-txt{font-size:.65rem;letter-spacing:.65em;color:rgba(180,230,190,.28);animation:tf 2s ease-in-out infinite}
@keyframes tf{0%,100%{opacity:.2}50%{opacity:.6}}

/* 版本标签 */
.ver-tag{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:300;padding:.3rem 1.1rem;background:rgba(30,100,40,.25);border:.5px solid rgba(80,190,100,.35);color:rgba(160,230,170,.78);font-size:.58rem;letter-spacing:.42em;border-radius:20px;backdrop-filter:blur(10px);pointer-events:none}

/* 切换按钮 */
.switch-btn{position:fixed;top:1rem;right:1.5rem;z-index:300;padding:.4rem 1rem;background:rgba(196,149,90,.1);border:.5px solid rgba(196,149,90,.3);color:rgba(235,210,165,.6);font-family:'Noto Serif SC',serif;font-size:.6rem;letter-spacing:.22em;cursor:pointer;border-radius:1px;text-decoration:none;transition:all .22s;display:block}
.switch-btn:hover{background:rgba(196,149,90,.22);color:rgba(235,210,165,.95)}

/* Scene Select */
#sel{position:fixed;inset:0;z-index:200;background:rgba(4,8,4,.96);backdrop-filter:blur(24px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .8s;padding:1.5rem 1rem}
#sel.on{opacity:1;pointer-events:all}
.s-title{font-family:'ZCOOL XiaoWei',serif;font-size:clamp(1.8rem,4vw,3rem);color:#e8f5ea;letter-spacing:.22em;text-align:center}
.s-tag-badge{margin:.55rem 0 1.8rem;padding:.28rem 1rem;background:rgba(40,120,50,.2);border:.5px solid rgba(80,180,90,.3);color:rgba(140,215,150,.78);font-size:.58rem;letter-spacing:.38em;border-radius:14px;display:inline-block}
.s-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;width:min(860px,94vw);border:.5px solid rgba(70,150,80,.1)}
.s-card{position:relative;cursor:pointer;padding:1.5rem 1.3rem 1.3rem;background:rgba(6,14,6,.82);border:.5px solid rgba(70,150,80,.07);transition:all .28s}
.s-card:hover{background:rgba(14,28,14,.92);border-color:rgba(70,150,80,.24)}
.s-card:hover .s-go{color:rgba(180,230,190,.72);transform:translateX(3px)}
.s-num{font-family:'Ma Shan Zheng',cursive;font-size:2.2rem;color:rgba(70,160,80,.08);position:absolute;top:.5rem;right:.9rem;transition:color .3s}
.s-card:hover .s-num{color:rgba(70,160,80,.42)}
.s-tag{font-size:.56rem;letter-spacing:.35em;color:rgba(100,190,110,.55);margin-bottom:.6rem}
.s-name{font-family:'ZCOOL XiaoWei',serif;font-size:1.15rem;color:#e8f5ea;letter-spacing:.15em;margin-bottom:.35rem}
.s-desc{font-size:.63rem;color:rgba(200,230,210,.35);letter-spacing:.08em;line-height:1.65}
.s-mood{margin-top:.75rem;padding-top:.65rem;border-top:.5px solid rgba(70,150,80,.1);font-size:.57rem;color:rgba(100,190,110,.42);letter-spacing:.18em}
.s-go{position:absolute;bottom:1rem;right:1.1rem;font-size:.6rem;color:rgba(200,230,210,.15);letter-spacing:.3em;transition:all .28s}

/* HUD */
#hud{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;transition:opacity 1s}
#hud.on{opacity:1}
.h-top{position:absolute;top:0;left:0;right:0;padding:1.4rem 2rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.58) 0%,transparent 100%);pointer-events:all}
.h-back{display:flex;align-items:center;gap:.5rem;font-family:'Noto Serif SC',serif;font-size:.68rem;letter-spacing:.32em;color:rgba(200,230,210,.52);cursor:pointer;background:none;border:none;transition:color .2s}
.h-back:hover{color:rgba(200,230,210,.9)}
.h-name{font-family:'ZCOOL XiaoWei',serif;font-size:.95rem;color:rgba(200,230,210,.65);letter-spacing:.3em}
.h-hint{font-size:.58rem;letter-spacing:.3em;color:rgba(200,230,210,.22)}

/* 呼吸引导 */
.h-breath{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:20px;pointer-events:none}
.b-svg{overflow:visible;filter:drop-shadow(0 0 20px rgba(100,220,120,.22))}
.b-r1{animation:br1 14s ease-in-out infinite;transform-origin:center}
.b-r2{animation:br2 14s ease-in-out infinite;transform-origin:center}
.b-r3{animation:br3 14s ease-in-out infinite;transform-origin:center}
.b-glow{transform-origin:center;animation:bGlow 14s ease-in-out infinite;fill:none}
@keyframes br1{0%,100%{transform:scale(.88);opacity:.28}25%{transform:scale(1.16);opacity:.55}36%{transform:scale(1.16);opacity:.50}67%{transform:scale(.88);opacity:.28}}
@keyframes br2{0%,100%{transform:scale(.80);opacity:.45}25%{transform:scale(1.26);opacity:.82}36%{transform:scale(1.26);opacity:.76}67%{transform:scale(.80);opacity:.45}}
@keyframes br3{0%,100%{transform:scale(.68);opacity:.55;fill:rgba(100,220,120,.07)}25%{transform:scale(1.36);opacity:1;fill:rgba(100,220,120,.20)}36%{transform:scale(1.36);opacity:.95;fill:rgba(100,220,120,.17)}67%{transform:scale(.68);opacity:.55;fill:rgba(100,220,120,.07)}}
@keyframes bGlow{0%,20%,40%,100%{transform:scale(.68);opacity:0}25%{transform:scale(1.54);opacity:.16}32%{transform:scale(1.62);opacity:0}}
.b-label{font-family:'Ma Shan Zheng',cursive;font-size:.9rem;color:rgba(180,240,190,.85);letter-spacing:.55em;text-shadow:0 0 22px rgba(100,220,120,.45),0 2px 10px rgba(0,0,0,.85)}
.b-state{font-size:.65rem;letter-spacing:.55em;color:rgba(140,230,155,.95);min-width:8em;text-align:center;text-shadow:0 0 18px rgba(80,200,100,.5),0 2px 8px rgba(0,0,0,.85);transition:opacity .6s}
.b-state.fade{opacity:0}

/* 底部 */
.h-bot{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 2rem 2rem;background:linear-gradient(0deg,rgba(0,0,0,.65) 0%,transparent 100%);pointer-events:all;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.h-audio{display:flex;gap:.65rem;flex-wrap:wrap}
.a-btn{display:flex;align-items:center;gap:.42rem;padding:.38rem .88rem;cursor:pointer;border:.5px solid rgba(180,230,190,.14);background:rgba(180,230,190,.04);color:rgba(180,230,190,.38);font-family:'Noto Serif SC',serif;font-size:.63rem;letter-spacing:.18em;transition:all .22s;border-radius:1px}
.a-btn:hover{background:rgba(180,230,190,.09);color:rgba(180,230,190,.72)}
.a-btn.on{border-color:rgba(70,190,90,.5);background:rgba(70,190,90,.12);color:rgba(200,240,210,.9)}
.a-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.a-btn.on .a-dot{animation:dp 1.8s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.2}}
.h-sw{display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center}
.sw-b{padding:.28rem .68rem;font-family:'Noto Serif SC',serif;font-size:.6rem;letter-spacing:.18em;border:.5px solid rgba(180,230,190,.12);background:transparent;color:rgba(180,230,190,.3);cursor:pointer;transition:all .2s;border-radius:1px}
.sw-b:hover{border-color:rgba(180,230,190,.38);color:rgba(180,230,190,.65)}
.sw-b.on{border-color:rgba(70,190,90,.52);color:rgba(200,240,210,.9);background:rgba(70,190,90,.12)}
.h-info{text-align:right}
.h-il{font-size:.54rem;letter-spacing:.38em;color:rgba(180,230,190,.2)}
.h-iv{font-size:.68rem;color:rgba(100,205,115,.65);letter-spacing:.14em;margin-top:2px}

/* Toast & OV */
#toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);z-index:500;padding:.5rem 1.2rem;background:rgba(4,14,4,.9);border:.5px solid rgba(70,190,90,.32);color:rgba(180,230,190,.72);font-family:'Noto Serif SC',serif;font-size:.68rem;letter-spacing:.2em;border-radius:2px;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
#ov{position:fixed;inset:0;z-index:250;background:#080c08;opacity:0;pointer-events:none;transition:opacity .5s}
#ov.on{opacity:1;pointer-events:all}
#offC{display:none}
</style>
</head>
<body>

<div id="load">
  <div class="l-seal">自<br>然</div>
  <div class="l-bar"><div class="l-fill" id="lf"></div></div>
  <div class="l-txt">正在进入自然</div>
</div>
<div id="ov"></div>
<div id="toast"></div>
<canvas id="glc"></canvas>
<canvas id="offC" width="2048" height="1024"></canvas>

<div class="ver-tag">🌿 真实自然风景版</div>
<a href="index.html" class="switch-btn">← 水墨版</a>

<!-- Scene Select -->
<div id="sel">
  <p class="s-title">进入疗愈场景吧</p>
  <span class="s-tag-badge">真实自然风景 · 对比实验版</span>
  <div class="s-grid" id="sgrid"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="h-top">
    <button class="h-back" onclick="goSel()">← 返 回</button>
    <div class="h-name" id="hname">山林晨雾</div>
    <div class="h-hint">拖 拽 · 环 视 四 方</div>
  </div>
  <div class="h-breath">
    <svg class="b-svg" width="220" height="220" viewBox="-110 -110 220 220">
      <circle class="b-glow" r="90" stroke="rgba(100,220,120,.55)" stroke-width="1"/>
      <circle class="b-r1" r="83" fill="none" stroke="rgba(160,235,170,.55)" stroke-width="1.2" stroke-dasharray="8 6"/>
      <circle class="b-r2" r="63" fill="none" stroke="rgba(160,235,170,.78)" stroke-width="1.8"/>
      <circle class="b-r3" r="43" fill="rgba(100,220,120,.07)" stroke="rgba(160,235,170,.95)" stroke-width="2.5"/>
    </svg>
    <div class="b-label">呼 · 吸</div>
    <div class="b-state" id="bst">缓缓吸气</div>
  </div>
  <div class="h-bot">
    <div class="h-audio">
      <div class="a-btn" id="an" onclick="togAudio('n')"><div class="a-dot"></div>自然白噪音</div>
      <div class="a-btn" id="am" onclick="togAudio('m')"><div class="a-dot"></div>轻音乐</div>
      <div class="a-btn" id="av" onclick="togVoice()"><div class="a-dot"></div>语音呼吸引导</div>
    </div>
    <div class="h-sw" id="hsw"></div>
    <div class="h-info">
      <div class="h-il">适 配 症 状</div>
      <div class="h-iv" id="hadp">焦虑 · 烦躁</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ════════════════════════
   场景数据 — 用你自己已有的风景图片
   把对应的风景照上传到 GitHub，命名如下
════════════════════════ */
const SCENES = [
  {
    id:'n_forest', name:'山林晨雾', tag:'真实森林 · 视觉疗愈',
    desc:'晨雾弥漫的原始山林，阳光穿透林间',
    mood:'焦虑 · 烦躁 · 压力过载',
    filter:'brightness(1.15) contrast(1.05)',
    img:'n_forest.jpg',   // 上传到 GitHub 的文件名
    fallback: drawForest
  },
  {
    id:'n_mountain', name:'云端雪山', tag:'壮阔山景 · 静心安神',
    desc:'皑皑雪山、云雾缭绕、天地辽阔',
    mood:'精神内耗 · 失眠 · 注意力涣散',
    filter:'brightness(1.2) contrast(1.0)',
    img:'n_mountain.jpg',
    fallback: drawMountain
  },
  {
    id:'n_stream', name:'溪谷流水', tag:'自然流水 · 疲惫修复',
    desc:'清澈溪流、巨石苔藓、林间光斑',
    mood:'情绪低落 · 紧绷 · 疲惫',
    filter:'brightness(1.1) contrast(1.05) saturate(1.1)',
    img:'n_stream.jpg',
    fallback: drawStream
  },
  {
    id:'n_lake', name:'湖畔静谧', tag:'湖光山色 · 思绪纾解',
    desc:'静如明镜的湖面、远山倒影、天水一色',
    mood:'嘈杂环境 · 抑郁 · 思绪杂乱',
    filter:'brightness(1.15) contrast(1.02) saturate(1.05)',
    img:'n_lake.jpg',
    fallback: drawLake
  },
  {
    id:'n_flower', name:'花海春日', tag:'繁花盛开 · 心情提振',
    desc:'漫山花海、姹紫嫣红、春日暖阳',
    mood:'抑郁 · 情绪低落 · 缺乏活力',
    filter:'brightness(1.15) saturate(1.15)',
    img:'n_flower.jpg',
    fallback: drawFlower
  },
  {
    id:'n_bamboo', name:'竹林深处', tag:'竹林漫步 · 心情舒缓',
    desc:'翠竹成林、阳光斑驳、清风徐来',
    mood:'社交压力 · 心情压抑',
    filter:'brightness(1.1) saturate(1.1)',
    img:'n_bamboo.jpg',
    fallback: drawBamboo
  },
];
const NUMS=['一','二','三','四','五','六'];

/* ════════════════════════
   Three.js 球面全景
════════════════════════ */
const canvas = document.getElementById('glc');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.toneMapping = THREE.NoToneMapping;
renderer.xr.enabled = true;

const scene3 = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(80,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,0,0.01);
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

const geo = new THREE.SphereGeometry(500,96,48); geo.scale(-1,1,1);
const mat = new THREE.MeshBasicMaterial({color:0x080c08});
scene3.add(new THREE.Mesh(geo,mat));
const capM = new THREE.MeshBasicMaterial({color:0x060a06});
[[-1,90],[1,-90]].forEach(([s,y])=>{const c=new THREE.Mesh(new THREE.CircleGeometry(500,64),capM);c.rotation.x=s*Math.PI/2;c.position.y=y;scene3.add(c);});

let drag=false,px=0,py=0,vy=0,vx=0,ry=0,rx=0,autoRot=0.0003;
const RS=0.003,DAMP=0.91,MRX=Math.PI*.38;
canvas.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;autoRot=0;});
window.addEventListener('mouseup',()=>drag=false);
window.addEventListener('mousemove',e=>{if(!drag)return;vy+=(e.clientX-px)*RS;vx+=(e.clientY-py)*RS*.55;px=e.clientX;py=e.clientY;});
canvas.addEventListener('touchstart',e=>{drag=true;px=e.touches[0].clientX;py=e.touches[0].clientY;autoRot=0;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{if(!drag)return;vy+=(e.touches[0].clientX-px)*RS;vx+=(e.touches[0].clientY-py)*RS*.55;px=e.touches[0].clientX;py=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('wheel',e=>{camera.fov=Math.max(38,Math.min(100,camera.fov+e.deltaY*.04));camera.updateProjectionMatrix();},{passive:true});

renderer.setAnimationLoop(()=>{
  if(!renderer.xr.isPresenting){
    vy*=DAMP;vx*=DAMP;ry+=vy+autoRot;rx+=vx;
    rx=Math.max(-MRX,Math.min(MRX,rx));
    const qY=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),ry);
    const qX=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),rx);
    camera.quaternion.copy(qY).multiply(qX);
  }
  renderer.render(scene3,camera);
});

/* 纹理 */
const loader=new THREE.TextureLoader();
const texCache={};
function applyTex(tex,filter){mat.map=tex;mat.needsUpdate=true;canvas.style.filter=filter||'';}
function loadSceneTex(s){
  if(texCache[s.id]){applyTex(texCache[s.id],s.filter);return;}
  fetch(s.img).then(r=>{if(!r.ok)throw new Error();return r.blob();})
    .then(blob=>{
      const url=URL.createObjectURL(blob);
      const img=new Image();
      img.onload=()=>{const t=new THREE.Texture(img);t.wrapS=THREE.RepeatWrapping;t.repeat.x=-1;t.offset.x=1;t.needsUpdate=true;texCache[s.id]=t;applyTex(t,s.filter);};
      img.src=url;
    })
    .catch(()=>{
      // 找不到图片时用程序化兜底
      const t=buildFallbackTex(s.fallback);texCache[s.id]=t;applyTex(t,s.filter);
    });
}

/* ════════════════════════
   程序化兜底纹理（6种自然场景）
════════════════════════ */
const offC=document.getElementById('offC');
const g=offC.getContext('2d');
const W=2048,H=1024;

function buildFallbackTex(drawFn){
  g.clearRect(0,0,W,H);
  drawFn();
  const t=new THREE.CanvasTexture(offC);
  t.wrapS=THREE.RepeatWrapping;t.repeat.x=-1;t.offset.x=1;t.needsUpdate=true;
  return t;
}
function lg(x0,y0,x1,y1,stops){const gr=g.createLinearGradient(x0,y0,x1,y1);stops.forEach(([t,c])=>gr.addColorStop(t,c));return gr;}
function rg(cx,cy,r0,r1,stops){const gr=g.createRadialGradient(cx,cy,r0,cx,cy,r1);stops.forEach(([t,c])=>gr.addColorStop(t,c));return gr;}

function drawForest(){
  // 森林晨雾：深绿色调，光柱，薄雾
  g.fillStyle=lg(0,0,0,H,[[0,'#6a9a6a'],[.35,'#5a8a5a'],[.65,'#4a7a4a'],[1,'#3a6a3a']]);g.fillRect(0,0,W,H);
  // 丁达尔光柱
  g.save();g.globalAlpha=.18;
  for(let i=0;i<8;i++){const x=W*(.1+i*.12),w=W*.08;
    const gr=g.createLinearGradient(x,0,x+w*.5,H*.7);gr.addColorStop(0,'rgba(255,245,200,.6)');gr.addColorStop(1,'rgba(255,245,200,0)');
    g.fillStyle=gr;g.beginPath();g.moveTo(x,0);g.lineTo(x+w,0);g.lineTo(x+w*1.4,H*.75);g.lineTo(x-.4*w,H*.75);g.fill();}
  g.restore();
  // 树干
  for(let t=0;t<40;t++){const tx=W*(t/40)+Math.random()*W*.025-W*.012,th=H*(.55+Math.random()*.3),tw=12+Math.random()*20;
    g.fillStyle=`rgba(${28+Math.random()*20|0},${18+Math.random()*12|0},${8+Math.random()*8|0},.85)`;
    g.fillRect(tx-tw/2,H-th,tw,th);}
  // 树冠层
  for(let l=0;l<4;l++){g.fillStyle=`rgba(${30+l*12},${80+l*18},${30+l*12},${.55+l*.12})`;
    g.beginPath();g.moveTo(0,H);
    for(let x=0;x<=W;x+=6){g.lineTo(x,H*(.62-l*.08)+Math.sin(x*.015+l)*H*.06);}
    g.lineTo(W,H);g.fill();}
  // 地面薄雾
  g.save();g.filter='blur(22px)';
  g.fillStyle=lg(0,H*.78,0,H,[[0,'rgba(200,230,210,0)'],[.5,'rgba(200,230,210,.35)'],[1,'rgba(180,220,190,.55)']]);
  g.fillRect(0,H*.76,W,H*.24);g.restore();
  // 暗角
  g.fillStyle=rg(W/2,H*.5,H*.25,H*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.35)']]);g.fillRect(0,0,W,H);
}

function drawMountain(){
  // 雪山云海：冷蓝白色调
  g.fillStyle=lg(0,0,0,H,[[0,'#b8d4f0'],[.3,'#d0e8f8'],[.6,'#e8f4ff'],[1,'#c8daf0']]);g.fillRect(0,0,W,H);
  // 太阳光晕
  g.save();g.filter='blur(60px)';
  g.fillStyle='rgba(255,245,220,.7)';g.beginPath();g.arc(W*.72,H*.12,120,0,Math.PI*2);g.fill();g.restore();
  // 云海
  g.save();g.filter='blur(25px)';
  g.fillStyle=lg(0,H*.55,0,H*.72,[[0,'rgba(255,255,255,0)'],[.5,'rgba(255,255,255,.9)'],[1,'rgba(240,250,255,.6)']]);
  g.fillRect(0,H*.52,W,H*.22);g.restore();
  // 远山轮廓
  [['rgba(120,160,200,.25)',H*.68,.55],['rgba(80,120,170,.45)',H*.62,.68],['rgba(50,90,145,.65)',H*.55,.8],['rgba(30,60,120,.85)',H*.48,.92]].forEach(([c,by,op])=>{
    g.fillStyle=c;g.beginPath();g.moveTo(0,H);
    let last=by;for(let x=0;x<=W;x+=8){const n=Math.sin(x*.003)*H*.08+Math.sin(x*.007)*H*.04+Math.sin(x*.015)*H*.02;last=by+n;g.lineTo(x,last);}
    g.lineTo(W,H);g.fill();});
  // 雪顶
  g.fillStyle='rgba(240,248,255,.92)';g.beginPath();
  const pk=[[W*.25,H*.3],[W*.5,H*.18],[W*.72,H*.27],[W*.88,H*.35]];
  pk.forEach(([px,py])=>{g.moveTo(px-80,py+60);g.lineTo(px,py);g.lineTo(px+80,py+60);g.closePath();});g.fill();
  // 底部地面
  g.fillStyle=lg(0,H*.85,0,H,[[0,'rgba(180,210,240,0)'],[1,'rgba(220,235,250,.8)']]);g.fillRect(0,H*.83,W,H*.17);
  g.fillStyle=rg(W/2,H*.5,H*.3,H*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.2)']]);g.fillRect(0,0,W,H);
}

function drawStream(){
  // 溪谷：翠绿，蓝色溪水
  g.fillStyle=lg(0,0,0,H,[[0,'#7aaa7a'],[.4,'#6a9a6a'],[1,'#5a8a5a']]);g.fillRect(0,0,W,H);
  // 树木背景
  for(let l=0;l<3;l++){g.fillStyle=`rgba(${28+l*8},${75+l*15},${28+l*8},${.6+l*.12})`;
    g.beginPath();g.moveTo(0,H);
    for(let x=0;x<=W;x+=5){g.lineTo(x,H*(.55-l*.06)+Math.sin(x*.02+l*1.5)*H*.055);}
    g.lineTo(W,H);g.fill();}
  // 溪流
  g.fillStyle=lg(0,H*.68,0,H*.88,[[0,'rgba(100,180,220,0)'],[.25,'rgba(100,185,225,.78)'],[.75,'rgba(80,165,210,.72)'],[1,'rgba(60,145,195,0)']]);
  g.beginPath();g.moveTo(W*.08,H);
  for(let x=W*.08;x<=W*.92;x+=6){const curve=Math.sin((x-W*.5)*.004)*H*.12;g.lineTo(x,H*.72+curve);}
  g.lineTo(W*.92,H);g.fill();
  // 水波
  for(let i=0;i<16;i++){g.strokeStyle=`rgba(200,235,245,${.42-i*.024})`;g.lineWidth=1.2;g.beginPath();g.moveTo(W*.15+i*10,H*.77+i*4);g.bezierCurveTo(W*.3,H*.74+i*4,W*.6,H*.76+i*4,W*.82-i*10,H*.77+i*4);g.stroke();}
  // 溪边石头
  for(let r=0;r<22;r++){const rx=W*(.12+Math.random()*.76),ry=H*(.79+Math.random()*.08),rw=18+Math.random()*40,rh=10+Math.random()*20;
    g.fillStyle=`rgba(${100+Math.random()*50|0},${90+Math.random()*40|0},${75+Math.random()*30|0},.82)`;
    g.beginPath();g.ellipse(rx,ry,rw,rh,0,0,Math.PI*2);g.fill();}
  // 苔藓感
  g.fillStyle=lg(0,H*.88,0,H,[[0,'rgba(40,100,40,0)'],[1,'rgba(30,80,35,.88)']]);g.fillRect(0,H*.86,W,H*.14);
  g.fillStyle=rg(W/2,H*.5,H*.28,H*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.28)']]);g.fillRect(0,0,W,H);
}

function drawLake(){
  // 湖泊：天蓝，山影倒映
  g.fillStyle=lg(0,0,0,H,[[0,'#92c8e8'],[.38,'#b2daf0'],[.5,'#c8eaf8'],[1,'#8ab8d8']]);g.fillRect(0,0,W,H);
  // 远山
  [['rgba(100,140,180,.32)',H*.62],['rgba(70,110,155,.52)',H*.56],['rgba(45,85,130,.72)',H*.50]].forEach(([c,by])=>{
    g.fillStyle=c;g.beginPath();g.moveTo(0,H);
    for(let x=0;x<=W;x+=6){g.lineTo(x,by+Math.sin(x*.004)*H*.07+Math.sin(x*.011)*H*.03);}
    g.lineTo(W,H);g.fill();});
  // 湖面
  g.fillStyle=lg(0,H*.62,0,H*.85,[[0,'rgba(100,170,210,0)'],[.2,'rgba(105,175,215,.88)'],[.8,'rgba(90,160,205,.82)'],[1,'rgba(75,145,195,0)']]);
  g.fillRect(0,H*.6,W,H*.28);
  // 倒影（上下翻转山）
  g.save();g.globalAlpha=.38;g.scale(1,-1);g.translate(0,-H*1.24);
  [['rgba(45,85,130,.52)',H*.50],['rgba(70,110,155,.38)',H*.56]].forEach(([c,by])=>{
    g.fillStyle=c;g.beginPath();g.moveTo(0,H);
    for(let x=0;x<=W;x+=6){g.lineTo(x,by+Math.sin(x*.004)*H*.07+Math.sin(x*.011)*H*.03);}
    g.lineTo(W,H);g.fill();});
  g.restore();
  // 水面涟漪
  for(let i=0;i<20;i++){g.strokeStyle=`rgba(220,240,252,${.35-i*.016})`;g.lineWidth=1;g.beginPath();g.moveTo(W*.04+i*8,H*.655+i*6);g.lineTo(W*.96-i*8,H*.655+i*6);g.stroke();}
  g.fillStyle=lg(0,H*.85,0,H,[[0,'rgba(80,140,180,0)'],[1,'rgba(65,120,165,.75)']]);g.fillRect(0,H*.83,W,H*.17);
  g.fillStyle=rg(W/2,H*.5,H*.3,H*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.22)']]);g.fillRect(0,0,W,H);
}

function drawFlower(){
  // 花海：暖粉，阳光充足
  g.fillStyle=lg(0,0,0,H,[[0,'#f0c8d8'],[.35,'#f8d8e8'],[.6,'#fce8f0'],[1,'#e8b8cc']]);g.fillRect(0,0,W,H);
  // 暖阳
  g.save();g.filter='blur(55px)';
  g.fillStyle='rgba(255,240,180,.65)';g.beginPath();g.arc(W*.65,H*.14,130,0,Math.PI*2);g.fill();g.restore();
  // 远处青山
  g.fillStyle='rgba(140,170,130,.38)';g.beginPath();g.moveTo(0,H);
  for(let x=0;x<=W;x+=6){g.lineTo(x,H*.52+Math.sin(x*.003)*H*.08+Math.sin(x*.009)*H*.035);}
  g.lineTo(W,H);g.fill();
  // 花海层（多层叠加）
  const flColors=['rgba(220,120,140,','rgba(235,150,170,','rgba(245,175,195,','rgba(250,200,215,','rgba(255,225,235,'];
  flColors.forEach((c,l)=>{
    g.fillStyle=c+(.55+l*.1)+')';g.beginPath();g.moveTo(0,H);
    for(let x=0;x<=W;x+=4){g.lineTo(x,H*(.58+l*.06)+Math.sin(x*.018+l*0.8)*H*.025);}
    g.lineTo(W,H);g.fill();});
  // 单朵花点缀
  for(let f=0;f<280;f++){
    const fx=Math.random()*W,fy=H*(.62+Math.random()*.32),fr=4+Math.random()*12;
    const hue=330+Math.random()*40-20;
    g.fillStyle=`hsla(${hue|0},75%,${72+Math.random()*20|0}%,.88)`;
    g.beginPath();g.arc(fx,fy,fr,0,Math.PI*2);g.fill();}
  // 绿叶
  for(let l=0;l<80;l++){const lx=Math.random()*W,ly=H*(.7+Math.random()*.25);
    g.strokeStyle=`rgba(60,130,60,${.5+Math.random()*.4})`;g.lineWidth=2;
    g.beginPath();g.moveTo(lx,ly);g.bezierCurveTo(lx+15,ly-20,lx+30,ly-18,lx+35,ly-5);g.stroke();}
  g.fillStyle=lg(0,H*.88,0,H,[[0,'rgba(180,100,120,0)'],[1,'rgba(150,80,100,.5)']]);g.fillRect(0,H*.86,W,H*.14);
  g.fillStyle=rg(W/2,H*.5,H*.3,H*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.18)']]);g.fillRect(0,0,W,H);
}

function drawBamboo(){
  // 竹林：清新翠绿，斑驳光影
  g.fillStyle=lg(0,0,0,H,[[0,'#78b878'],[.4,'#68a868'],[1,'#589858']]);g.fillRect(0,0,W,H);
  // 透过竹叶的光
  g.save();g.globalAlpha=.15;
  for(let i=0;i<10;i++){const bx=W*(i*.1+.02),bw=W*.06;
    g.fillStyle=lg(bx,0,bx+bw*.5,H*.65,[[0,'rgba(255,252,200,.7)'],[1,'rgba(255,252,200,0)']]);
    g.beginPath();g.moveTo(bx,0);g.lineTo(bx+bw,0);g.lineTo(bx+bw*1.3,H*.68);g.lineTo(bx-.3*bw,H*.68);g.fill();}
  g.restore();
  // 竹竿
  for(let b=0;b<36;b++){
    const bx=(b/36)*W+Math.random()*W*.028-W*.014;
    const bw=9+Math.random()*14;
    const cv=(Math.random()-.5)*W*.035;
    const gr=g.createLinearGradient(bx,0,bx+bw,0);
    gr.addColorStop(0,`rgba(42,108,36,.88)`);gr.addColorStop(.45,`rgba(72,148,52,.92)`);gr.addColorStop(1,`rgba(32,90,28,.88)`);
    g.fillStyle=gr;g.beginPath();
    g.moveTo(bx,H);g.bezierCurveTo(bx+cv*.3,H*.6,bx+cv*.7,H*.28,bx+cv,0);
    g.lineTo(bx+bw+cv,0);g.bezierCurveTo(bx+bw+cv*.7,H*.28,bx+bw+cv*.3,H*.6,bx+bw,H);
    g.closePath();g.fill();
    // 竹节
    for(let n=1;n<10;n++){const ny=H-n*(H/10);g.strokeStyle=`rgba(22,72,18,.72)`;g.lineWidth=bw+2;g.beginPath();g.moveTo(bx,ny);g.lineTo(bx+bw,ny);g.stroke();}
    // 竹叶
    for(let l=0;l<4;l++){const lx=bx+Math.random()*bw,ly=Math.random()*H*.7,ll=32+Math.random()*48,ld=(Math.random()-.5)*Math.PI*.9;
      g.strokeStyle=`rgba(38,115,32,.72)`;g.lineWidth=2.5;
      g.beginPath();g.moveTo(lx,ly);g.bezierCurveTo(lx+Math.cos(ld)*ll*.4,ly+Math.sin(ld)*ll*.4,lx+Math.cos(ld)*ll*.85,ly+Math.sin(ld)*ll*.2,lx+Math.cos(ld)*ll,ly+Math.sin(ld)*ll*.05);g.stroke();}
  }
  // 地面
  g.fillStyle=lg(0,H*.84,0,H,[[0,'rgba(35,95,30,0)'],[1,'rgba(25,75,22,.95)']]);g.fillRect(0,H*.82,W,H*.18);
  g.fillStyle=rg(W/2,H*.5,H*.25,H*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.25)']]);g.fillRect(0,0,W,H);
}

/* ════════════════════════
   音频
════════════════════════ */
let aC=null,nGain=null,mGain=null;
const aS={n:false,m:false};
function initAudio(){
  if(aC)return;
  aC=new(window.AudioContext||window.webkitAudioContext)();
  const len=aC.sampleRate*4,buf=aC.createBuffer(1,len,aC.sampleRate);
  const d=buf.getChannelData(0);let v=0;
  for(let i=0;i<len;i++){v=v*.94+(Math.random()-.5)*.2;d[i]=v*(0.6+0.4*Math.sin(i/aC.sampleRate*0.8));}
  const lp=aC.createBiquadFilter();lp.type='bandpass';lp.frequency.value=600;lp.Q.value=1.2;
  nGain=aC.createGain();nGain.gain.value=0;
  const ns=aC.createBufferSource();ns.buffer=buf;ns.loop=true;
  ns.connect(lp);lp.connect(nGain);nGain.connect(aC.destination);ns.start();
  mGain=aC.createGain();mGain.gain.value=0;mGain.connect(aC.destination);
}
function togAudio(k){
  initAudio();if(aC.state==='suspended')aC.resume();
  aS[k]=!aS[k];
  document.getElementById(k==='n'?'an':'am').classList.toggle('on',aS[k]);
  const gn=k==='n'?nGain:mGain;
  gn.gain.cancelScheduledValues(aC.currentTime);gn.gain.linearRampToValueAtTime(aS[k]?.5:0,aC.currentTime+.7);
  if(k==='m'&&aS.m)playMusic();
  toast(k==='n'?(aS.n?'🌿 自然白噪音 已开启':'自然白噪音 已关闭'):(aS.m?'🎵 轻音乐 已开启':'轻音乐 已关闭'));
}
function playMusic(){
  if(!aC||!mGain||!aS.m)return;
  // G大调五声音阶，清新自然感
  const scale=[392,440,493.88,523.25,587.33,659.25,739.99,783.99];
  const pat=[0,2,4,3,2,4,5,4,2,0,1,2,4,6,5,4];
  const durs=[1.0,0.7,1.2,0.9,0.7,1.0,1.3,1.0,0.7,1.4,0.7,1.0,1.2,1.4,1.0,1.8];
  let t=aC.currentTime+.1;
  pat.forEach((ni,i)=>{
    const osc=aC.createOscillator();osc.type='sine';osc.frequency.value=scale[ni];
    const gn=aC.createGain();gn.gain.setValueAtTime(0,t+i*durs[i]);gn.gain.linearRampToValueAtTime(.16,t+i*durs[i]+.06);gn.gain.linearRampToValueAtTime(0,t+i*durs[i]+durs[i]*.95);
    osc.connect(gn);gn.connect(mGain);osc.start(t+i*durs[i]);osc.stop(t+i*durs[i]+durs[i]);
    t+=durs[i]*.0; // 时间累加在上面已经是 t+i*durs[i]
  });
  setTimeout(()=>{if(aS.m)playMusic();},pat.reduce((a,_,i)=>a+durs[i],0)*1000+300);
}

/* ════════════════════════
   语音引导
════════════════════════ */
let voiceEnabled=false;
const speechSynth=window.speechSynthesis;
let zhVoice=null;
function initVoice(){const v=speechSynth.getVoices();zhVoice=v.find(x=>x.lang.includes('zh')||x.lang.includes('CN'))||v[0];}
speechSynth.onvoiceschanged=initVoice;initVoice();
function speak(text){
  if(!voiceEnabled||!speechSynth)return;speechSynth.cancel();
  const u=new SpeechSynthesisUtterance(text);if(zhVoice)u.voice=zhVoice;
  u.lang='zh-CN';u.rate=0.78;u.pitch=0.92;u.volume=0.88;speechSynth.speak(u);
}
const bVoice=['缓缓地吸气，感受大自然清新的气息','屏住呼吸，聆听自然的声音','慢慢地呼气，让身心融入这片风景','自然呼吸，回归宁静'];
const bStates=['缓缓吸气','屏息片刻','缓缓呼气','自然呼吸'],bDurs=[3500,1500,4500,4500];
let bI=0;
(function breath(){
  const el=document.getElementById('bst');el.classList.add('fade');
  setTimeout(()=>{el.textContent=bStates[bI];el.classList.remove('fade');speak(bVoice[bI]);bI=(bI+1)%4;setTimeout(breath,bDurs[bI]);},500);
})();
function togVoice(){
  voiceEnabled=!voiceEnabled;
  document.getElementById('av').classList.toggle('on',voiceEnabled);
  if(!voiceEnabled)speechSynth.cancel();
  else speak('语音呼吸引导已开启，请跟随引导感受自然的呼吸');
  toast(voiceEnabled?'🎙 语音呼吸引导 已开启':'语音呼吸引导 已关闭');
}

/* ════════════════════════
   页面流程
════════════════════════ */
const sgrid=document.getElementById('sgrid');
const hsw=document.getElementById('hsw');
SCENES.forEach((s,i)=>{
  const c=document.createElement('div');c.className='s-card';
  c.innerHTML=`<div class="s-num">${NUMS[i]}</div><div class="s-tag">${s.tag}</div><div class="s-name">${s.name}</div><div class="s-desc">${s.desc}</div><div class="s-mood">· ${s.mood}</div><div class="s-go">进入 →</div>`;
  c.onclick=()=>enter(s);sgrid.appendChild(c);
  const b=document.createElement('button');b.className='sw-b'+(i===0?' on':'');b.dataset.id=s.id;b.textContent=s.name;b.onclick=()=>enter(s);hsw.appendChild(b);
});

function goSel(){document.getElementById('hud').classList.remove('on');document.getElementById('sel').classList.add('on');}

function enter(s){
  const ov=document.getElementById('ov');ov.classList.add('on');
  setTimeout(()=>{
    document.getElementById('hname').textContent=s.name;
    document.getElementById('hadp').textContent=s.mood;
    document.querySelectorAll('.sw-b').forEach(b=>b.classList.toggle('on',b.dataset.id===s.id));
    ry=0;rx=0;vy=0;vx=0;autoRot=0.0003;
    loadSceneTex(s);
    document.getElementById('sel').classList.remove('on');
    document.getElementById('hud').classList.add('on');
    ov.classList.remove('on');
  },480);
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

/* Boot */
(function boot(){
  const bar=document.getElementById('lf');let p=0;
  buildFallbackTex(SCENES[0].fallback); // 先显示程序化背景
  const iv=setInterval(()=>{
    p+=12+Math.random()*18;bar.style.width=Math.min(p,95)+'%';
    if(p>=100){clearInterval(iv);bar.style.width='100%';
      setTimeout(()=>{document.getElementById('load').classList.add('out');
        setTimeout(()=>{document.getElementById('load').style.display='none';document.getElementById('sel').classList.add('on');},1400);},200);}
  },100);
})();
