<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>疗愈空间 · 360°</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0806;font-family:'Noto Serif SC',serif}

/* ─── CANVAS ─── */
#glc{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;touch-action:none;}
#glc:active{cursor:grabbing}

/* ─── LOADING ─── */
#load{
  position:fixed;inset:0;z-index:300;
  background:#0a0806;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;
  transition:opacity 1.4s ease;
}
#load.out{opacity:0;pointer-events:none}
.l-seal{
  width:72px;height:72px;border:1.5px solid #7a1a1a;
  display:flex;align-items:center;justify-content:center;
  font-family:'Ma Shan Zheng',cursive;font-size:1.05rem;color:#9a2a2a;
  line-height:1.5;text-align:center;
  animation:sealPulse 2.4s ease-in-out infinite;
}
@keyframes sealPulse{0%,100%{opacity:.4;transform:scale(.94)}50%{opacity:1;transform:scale(1)}}
.l-bar{width:150px;height:1px;background:rgba(180,130,70,.15);position:relative;overflow:hidden}
.l-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#a07040,#c4955a);width:0%;transition:width .3s ease}
.l-txt{font-size:.65rem;letter-spacing:.65em;color:rgba(235,220,195,.28);animation:ltFade 2s ease-in-out infinite}
@keyframes ltFade{0%,100%{opacity:.2}50%{opacity:.6}}

/* ─── SCENE SELECT ─── */
#sel{
  position:fixed;inset:0;z-index:200;
  background:rgba(8,6,4,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .8s ease;
  padding:1.5rem 1rem;
}
#sel.on{opacity:1;pointer-events:all}
.s-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:clamp(1.8rem,4vw,3.2rem);
  color:#f0e8d8;letter-spacing:.22em;text-align:center;
  text-shadow:0 0 40px rgba(196,149,90,.2);
  animation:fadeUp .9s ease both;
}
.s-sub{
  font-size:.62rem;letter-spacing:.55em;color:rgba(196,149,90,.55);
  margin:.7rem 0 2.5rem;animation:fadeUp .9s .12s ease both;text-align:center;
}
.s-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;width:min(880px,96vw);
  border:.5px solid rgba(196,149,90,.1);
  animation:fadeUp .9s .2s ease both;
}
.s-card{
  position:relative;cursor:pointer;
  padding:1.6rem 1.4rem 1.4rem;
  background:rgba(18,12,5,.82);
  border:.5px solid rgba(196,149,90,.06);
  transition:background .3s,border-color .3s;
  overflow:hidden;
}
.s-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(196,149,90,.07) 0%,transparent 55%);
  opacity:0;transition:opacity .3s;
}
.s-card:hover{background:rgba(36,24,10,.92);border-color:rgba(196,149,90,.22)}
.s-card:hover::before{opacity:1}
.s-card:hover .s-go{color:rgba(235,220,195,.7);transform:translateX(4px)}
.s-num{
  font-family:'Ma Shan Zheng',cursive;font-size:2.4rem;
  color:rgba(196,149,90,.07);position:absolute;top:.5rem;right:.9rem;
  line-height:1;transition:opacity .3s;
}
.s-card:hover .s-num{color:rgba(196,149,90,.42)}
.s-tag{font-size:.56rem;letter-spacing:.38em;color:rgba(196,149,90,.52);margin-bottom:.65rem}
.s-name{
  font-family:'ZCOOL XiaoWei',serif;font-size:1.18rem;
  color:#f0e8d8;letter-spacing:.16em;margin-bottom:.38rem;
}
.s-desc{font-size:.63rem;color:rgba(235,220,195,.34);letter-spacing:.08em;line-height:1.7}
.s-mood{
  margin-top:.8rem;padding-top:.7rem;
  border-top:.5px solid rgba(196,149,90,.1);
  font-size:.57rem;color:rgba(196,149,90,.4);letter-spacing:.18em;
}
.s-go{
  position:absolute;bottom:1rem;right:1.1rem;
  font-size:.6rem;color:rgba(235,220,195,.15);
  letter-spacing:.3em;transition:all .3s;
}

/* ─── HUD ─── */
#hud{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;transition:opacity 1.2s ease}
#hud.on{opacity:1}

/* top */
.h-top{
  position:absolute;top:0;left:0;right:0;padding:1.5rem 2.2rem;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(0,0,0,.62) 0%,transparent 100%);
  pointer-events:all;
}
.h-back{
  display:flex;align-items:center;gap:.55rem;
  font-size:.68rem;letter-spacing:.32em;color:rgba(235,220,195,.52);
  cursor:pointer;background:none;border:none;font-family:inherit;
  transition:color .2s;
}
.h-back:hover{color:rgba(235,220,195,.92)}
.h-name{
  font-family:'ZCOOL XiaoWei',serif;font-size:1rem;
  color:rgba(235,220,195,.65);letter-spacing:.32em;
}
.h-hint{font-size:.58rem;letter-spacing:.3em;color:rgba(235,220,195,.22)}

/* breath */
.h-breath{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:13px;
  pointer-events:none;
}
.b-svg{overflow:visible}
.b-r1{animation:br1 7s ease-in-out infinite;transform-origin:center}
.b-r2{animation:br2 7s ease-in-out infinite;transform-origin:center}
.b-r3{animation:br3 7s ease-in-out infinite;transform-origin:center}
@keyframes br1{0%,100%{transform:scale(1);opacity:.09}50%{transform:scale(1.2);opacity:.18}}
@keyframes br2{0%,100%{transform:scale(1);opacity:.13}50%{transform:scale(1.26);opacity:.26}}
@keyframes br3{0%,100%{transform:scale(1);opacity:.2;fill:rgba(235,220,195,.03)}50%{transform:scale(1.32);opacity:.38;fill:rgba(235,220,195,.07)}}
.b-label{
  font-family:'Ma Shan Zheng',cursive;font-size:.74rem;
  color:rgba(235,220,195,.26);letter-spacing:.42em;
  animation:bFade 7s ease-in-out infinite;
}
.b-state{
  font-size:.52rem;letter-spacing:.46em;color:rgba(196,149,90,.36);
  animation:bFade 7s 1.5s ease-in-out infinite;
}
@keyframes bFade{0%,100%{opacity:.16}50%{opacity:.45}}

/* bottom */
.h-bot{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.6rem 2.2rem 2.2rem;
  background:linear-gradient(0deg,rgba(0,0,0,.65) 0%,transparent 100%);
  pointer-events:all;
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:1rem;flex-wrap:wrap;
}
.h-audio{display:flex;gap:.7rem;align-items:center}
.a-btn{
  display:flex;align-items:center;gap:.45rem;
  padding:.4rem .92rem;cursor:pointer;
  border:.5px solid rgba(235,220,195,.15);
  background:rgba(235,220,195,.04);
  color:rgba(235,220,195,.38);
  font-family:inherit;font-size:.63rem;letter-spacing:.2em;
  transition:all .22s;border-radius:1px;
}
.a-btn:hover{background:rgba(235,220,195,.09);color:rgba(235,220,195,.72)}
.a-btn.on{
  border-color:rgba(196,149,90,.52);
  background:rgba(196,149,90,.14);
  color:rgba(235,220,195,.9);
}
.a-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.a-btn.on .a-dot{animation:dotP 1.8s ease-in-out infinite}
@keyframes dotP{0%,100%{opacity:1}50%{opacity:.2}}

/* scene switcher */
.h-sw{display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center}
.sw-btn{
  padding:.28rem .7rem;font-family:inherit;font-size:.6rem;
  letter-spacing:.18em;border:.5px solid rgba(235,220,195,.13);
  background:transparent;color:rgba(235,220,195,.3);
  cursor:pointer;transition:all .2s;border-radius:1px;
}
.sw-btn:hover{border-color:rgba(235,220,195,.38);color:rgba(235,220,195,.65)}
.sw-btn.on{
  border-color:rgba(196,149,90,.55);
  color:rgba(235,220,195,.92);
  background:rgba(196,149,90,.14);
}
.h-info{text-align:right}
.h-il{font-size:.54rem;letter-spacing:.4em;color:rgba(235,220,195,.2)}
.h-iv{font-size:.68rem;color:rgba(196,149,90,.68);letter-spacing:.14em;margin-top:2px}

/* ─── OVERLAY + TOAST ─── */
#ov{position:fixed;inset:0;z-index:250;background:#0a0806;opacity:0;pointer-events:none;transition:opacity .5s ease}
#ov.on{opacity:1;pointer-events:all}
#toast{
  position:fixed;bottom:6rem;left:50%;transform:translateX(-50%);
  z-index:400;padding:.52rem 1.3rem;
  background:rgba(24,16,6,.9);border:.5px solid rgba(196,149,90,.35);
  color:rgba(235,220,195,.75);font-size:.68rem;letter-spacing:.2em;
  border-radius:2px;opacity:0;transition:opacity .4s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ─── PLACEHOLDER CANVAS ─── */
#offC{display:none}
</style>
</head>
<body>

<div id="load">
  <div class="l-seal">静<br>心</div>
  <div class="l-bar"><div class="l-fill" id="lf"></div></div>
  <div class="l-txt">正在展开山河</div>
</div>

<div id="ov"></div>
<div id="toast"></div>

<canvas id="glc"></canvas>
<canvas id="offC" width="2048" height="1024"></canvas>

<!-- SCENE SELECT -->
<div id="sel">
  <p class="s-title">进入疗愈场景吧</p>
  <p class="s-sub">六境 · 360° 沉浸 · 归于当下</p>
  <div class="s-grid" id="sgrid"></div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="h-top">
    <button class="h-back" onclick="goSel()">← 返 回</button>
    <div class="h-name" id="hname">富春山居</div>
    <div class="h-hint">拖 拽 · 环 视 四 方</div>
  </div>

  <div class="h-breath">
    <svg class="b-svg" width="128" height="128" viewBox="-64 -64 128 128">
      <circle class="b-r1" r="54" fill="none" stroke="rgba(235,220,195,.09)" stroke-width=".5"/>
      <circle class="b-r2" r="40" fill="none" stroke="rgba(235,220,195,.14)" stroke-width=".5"/>
      <circle class="b-r3" r="26" fill="rgba(235,220,195,.03)" stroke="rgba(235,220,195,.28)" stroke-width=".5"/>
    </svg>
    <div class="b-label">呼 · 吸</div>
    <div class="b-state" id="bst">缓缓吸气</div>
  </div>

  <div class="h-bot">
    <div class="h-audio">
      <div class="a-btn" id="an" onclick="togAudio('n')"><div class="a-dot"></div>自然白噪音</div>
      <div class="a-btn" id="am" onclick="togAudio('m')"><div class="a-dot"></div>传统疗愈音乐</div>
    </div>
    <div class="h-sw" id="hsw"></div>
    <div class="h-info">
      <div class="h-il">适 配 症 状</div>
      <div class="h-iv" id="hadp">焦虑 · 烦躁</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ════════════════════════════
   SCENE DATA
════════════════════════════ */
const SCENES = [
  { id:'fuchun',  name:'富春山居', tag:'山水水墨 · 视觉疗愈',
    desc:'远山淡墨、云雾缓流、江面平阔、轻舟无痕',
    mood:'焦虑 · 烦躁 · 压力过载',
    filter:'brightness(1.9) contrast(1.05)' },
  { id:'yunshan', name:'云山禅境', tag:'极简禅意 · 静心安神',
    desc:'孤峰耸立、云海漫涌、古松挺立、留白深远',
    mood:'精神内耗 · 失眠 · 注意力涣散',
    filter:'brightness(1.8) contrast(1.05)' },
  { id:'xishan',  name:'溪山行旅', tag:'自然疗愈 · 疲惫修复',
    desc:'浅溪、石桥、远山、雾霭、林间微光',
    mood:'情绪低落 · 紧绷 · 疲惫',
    filter:'brightness(1.8) contrast(1.05)' },
  { id:'tingyu',  name:'听雨轩窗', tag:'中式园林 · 思绪纾解',
    desc:'苏式园林、漏窗、荷塘、芭蕉、细雨轻落',
    mood:'嘈杂环境 · 抑郁 · 思绪杂乱',
    filter:'brightness(2.8) contrast(1.0) saturate(1.3)' },
  { id:'bimo',    name:'笔墨静心', tag:'书房禅意 · 专注提升',
    desc:'明式书房、文房四宝、竹影窗纱、青烟袅袅',
    mood:'浮躁 · 考前紧张 · 专注力差',
    filter:'brightness(3.2) contrast(0.95) saturate(0.8) sepia(0.2)' },
  { id:'lanting', name:'兰亭曲水', tag:'竹林胜境 · 心情舒缓',
    desc:'茂林修竹、曲水流觞、落花逐水',
    mood:'社交压力 · 心情压抑',
    filter:'brightness(1.9) contrast(1.05)' },
];

/* ════════════════════════════
   THREE.JS — SPHERE VIEWER
════════════════════════════ */
const canvas = document.getElementById('glc');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 0.01);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Sphere — camera inside, normals flipped inward
const geo = new THREE.SphereGeometry(500, 96, 48);
geo.scale(-1, 1, 1);
const mat = new THREE.MeshBasicMaterial({ color: 0x111008 });
const mesh = new THREE.Mesh(geo, mat);
scene.add(mesh);

// Top/bottom caps to hide pole distortion
const capMat = new THREE.MeshBasicMaterial({ color: 0x0a0806 });
const topCap = new THREE.Mesh(new THREE.CircleGeometry(500, 64), capMat);
topCap.rotation.x = -Math.PI / 2; topCap.position.y = 90; scene.add(topCap);
const botCap = new THREE.Mesh(new THREE.CircleGeometry(500, 64), capMat);
botCap.rotation.x = Math.PI / 2; botCap.position.y = -90; scene.add(botCap);

/* ── ORBIT CONTROLS ── */
let isDrag = false, px = 0, py = 0, vy = 0, vx = 0, ry = 0, rx = 0;
const RS = 0.0028, DAMP = 0.90, MRX = Math.PI * 0.38;
let autoRotSpeed = 0.0004; // slow auto-pan

canvas.addEventListener('mousedown', e => { isDrag=true; px=e.clientX; py=e.clientY; autoRotSpeed=0; });
window.addEventListener('mouseup', () => { isDrag=false; });
window.addEventListener('mousemove', e => {
  if (!isDrag) return;
  vy += (e.clientX - px) * RS; vx += (e.clientY - py) * RS * 0.55;
  px = e.clientX; py = e.clientY;
});
canvas.addEventListener('touchstart', e => { isDrag=true; px=e.touches[0].clientX; py=e.touches[0].clientY; autoRotSpeed=0; }, {passive:true});
window.addEventListener('touchend', () => { isDrag=false; });
window.addEventListener('touchmove', e => {
  if (!isDrag) return;
  vy += (e.touches[0].clientX - px) * RS; vx += (e.touches[0].clientY - py) * RS * 0.55;
  px = e.touches[0].clientX; py = e.touches[0].clientY;
}, {passive:true});
canvas.addEventListener('wheel', e => {
  camera.fov = Math.max(38, Math.min(100, camera.fov + e.deltaY * 0.04));
  camera.updateProjectionMatrix();
}, {passive:true});

function updateCam() {
  vy *= DAMP; vx *= DAMP;
  ry += vy + autoRotSpeed;
  rx += vx;
  rx = Math.max(-MRX, Math.min(MRX, rx));
  const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), ry);
  const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), rx);
  camera.quaternion.copy(qY).multiply(qX);
}

// Render loop
const clock = new THREE.Clock();
(function loop() {
  requestAnimationFrame(loop);
  clock.getDelta();
  updateCam();
  renderer.render(scene, camera);
})();

/* ════════════════════════════
   TEXTURE LOADING
   普通图片 → 拉伸铺满球面内壁
   产生良好的沉浸感
════════════════════════════ */
const loader = new THREE.TextureLoader();
const texCache = {};

function loadSceneTex(id) {
  if (texCache[id]) {
    applyTex(texCache[id]);
    return;
  }
  // Try real image first
  loader.load(
    id + '.jpg',
    tex => {
      tex.encoding = THREE.sRGBEncoding;
      tex.wrapS = THREE.RepeatWrapping;
      // Horizontal mirror flip for correct orientation inside sphere
      tex.repeat.x = -1; tex.offset.x = 1;
      texCache[id] = tex;
      applyTex(tex);
    },
    undefined,
    () => {
      // Fallback: procedural canvas texture
      buildProceduralTex(id);
    }
  );
}

function applyTex(tex) {
  mat.map = tex;
  mat.needsUpdate = true;
}

/* ════════════════════════════
   PROCEDURAL FALLBACK TEXTURES
════════════════════════════ */
const offC = document.getElementById('offC');
const g = offC.getContext('2d');
const W = 2048, H = 1024;

function mkRng(seed) {
  let s = seed|0;
  return () => { s = Math.imul(48271,s)|0; return (s>>>0)/2**32; };
}
function lg(x0,y0,x1,y1,stops) {
  const gr = g.createLinearGradient(x0,y0,x1,y1);
  stops.forEach(([t,c]) => gr.addColorStop(t,c)); return gr;
}
function rg(cx,cy,r0,r1,stops) {
  const gr = g.createRadialGradient(cx,cy,r0,cx,cy,r1);
  stops.forEach(([t,c]) => gr.addColorStop(t,c)); return gr;
}
function bl(b,fn){g.save();g.filter=`blur(${b}px)`;fn();g.restore();}
function ridge(rng,by,amp,freq,oct,col){
  g.fillStyle=col;g.beginPath();g.moveTo(0,H);
  for(let x=0;x<=W;x+=3){
    let n=0,a=1,f=freq;
    for(let o=0;o<oct;o++){n+=Math.sin(x*f*Math.PI*2/W+(rng()+o)*.5)*a;a*=.5;f*=2.1;}
    g.lineTo(x,by+n*amp);
  }
  g.lineTo(W,H);g.closePath();g.fill();
}
function pine(x,y,h,a){
  g.strokeStyle=`rgba(44,30,14,${a*.9})`;g.lineWidth=5;
  g.beginPath();g.moveTo(x,y);g.lineTo(x+3,y-h);g.stroke();
  for(let l=0;l<6;l++){
    const ly=y-h*(.22+l*.14),lw=h*(.36-l*.04);
    g.fillStyle=`rgba(30,65,34,${a*(.5+l*.07)})`;
    [-1,1].forEach(d=>{g.beginPath();g.moveTo(x+3,ly-h*.09);g.bezierCurveTo(x+d*lw*.1,ly,x+d*lw,ly+h*.07,x+d*lw*1.1,ly+h*.03);g.bezierCurveTo(x+d*lw*.5,ly-h*.05,x+d*lw*.2,ly-h*.06,x+3,ly-h*.09);g.fill();});
  }
}

const DRAWS = {
  fuchun(rng){
    g.fillStyle=lg(0,0,0,H,[[0,'#c0d0e0'],[.38,'#d6e2e8'],[.62,'#dee8e0'],[1,'#c6c2b0']]);g.fillRect(0,0,W,H);
    bl(70,()=>{g.fillStyle=rg(W*.76,H*.13,0,W*.3,[[0,'rgba(255,236,170,.88)'],[1,'rgba(0,0,0,0)']]);g.fillRect(0,0,W,H);});
    [{y:.71,a:56,d:.44,c:'rgba(176,194,212,'},{y:.65,a:76,d:.63,c:'rgba(140,162,184,'},{y:.59,a:96,d:.77,c:'rgba(98,126,150,'},{y:.53,a:116,d:.89,c:'rgba(63,90,114,'},{y:.47,a:130,d:.97,c:'rgba(38,62,86,'}].forEach((m,i)=>{
      if(i<3)bl((3-i)*6,()=>ridge(rng,H*m.y,m.a,1.8+i*.6,4,m.c+m.d+')'));
      else ridge(rng,H*m.y,m.a,1.8+i*.6,4,m.c+m.d+')');

function buildProceduralTex(id) {
  const seed = Array.from(id).reduce((a,c) => a + c.charCodeAt(0)*31, 0);
  const rng = mkRng(seed);
  g.clearRect(0,0,W,H);
  if (DRAWS[id]) DRAWS[id](rng);
  const tex = new THREE.CanvasTexture(offC);
  tex.needsUpdate = true;
  tex.wrapS = THREE.RepeatWrapping;
  tex.repeat.x = -1; tex.offset.x = 1;
  texCache[id] = tex;
  applyTex(tex);
}

    noise: (ac, out) => {
      const len = ac.sampleRate * 3;

      src.connect(lp); lp.connect(bp); bp.connect(out); src.start();

        osc.connect(g); g.connect(out);
        osc2.connect(g2); g2.connect(out);
        osc.start(t0 + waits[i]); osc.stop(t0 + waits[i] + 5);
        osc2.start(t0 + waits[i]); osc2.stop(t0 + waits[i] + 3);
        nodes.push(osc, osc2, g, g2);
      });
      return nodes;
    },
    musicDur: 34000
  },

  xishan: {
    noiseName: '溪流鸟鸣',
    musicName: '竹笛·山涧',
    noise: (ac, out) => {
      const len = ac.sampleRate * 3;
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      let v = 0;
      for (let i = 0; i < len; i++) {
        v = v * 0.92 + (Math.random() - 0.5) * 0.25;
        // 加水流起伏感
        d[i] = v * (0.6 + 0.4 * Math.sin(i / ac.sampleRate * 1.2));
      }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 600; bp.Q.value = 1.2;
      src.connect(bp); bp.connect(out); src.start();
      // 鸟鸣感（间歇高频脉冲）
      const bird = ac.createOscillator(); bird.type = 'sine'; bird.frequency.value = 2800;
      const bG = ac.createGain(); bG.gain.value = 0.0001;
      bird.connect(bG); bG.connect(out); bird.start();
      const lfo2 = ac.createOscillator(); lfo2.type = 'square'; lfo2.frequency.value = 0.15;
      const lfoG2 = ac.createGain(); lfoG2.gain.value = 0.015;
      lfo2.connect(lfoG2); lfoG2.connect(bG.gain); lfo2.start();
      return [src, bp, bird, bG, lfo2, lfoG2];
    },
    music: (ac, out, vol) => {
      // 竹笛风格：G大调，轻快跳音
      const scale = [392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 739.99, 783.99];
      const melody = [0,2,4,3,2,4,5,4,2,0,1,2,4,6,5,4,2,4,3,2,0];
      const durs =   [0.8,0.6,1.2,0.8,0.6,0.8,1.0,0.8,0.6,1.2,0.6,0.8,1.0,1.2,0.8,1.0,0.6,0.8,0.6,1.0,1.8];
      let t = ac.currentTime + 0.2;
      const nodes = [];
      melody.forEach((ni, i) => {
        const osc = ac.createOscillator(); osc.type = 'sine';
        osc.frequency.value = scale[ni];
        const osc2 = ac.createOscillator(); osc2.type = 'triangle';
        osc2.frequency.value = scale[ni] * 0.5;
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol * 0.2, t + 0.04);
        g.gain.linearRampToValueAtTime(vol * 0.12, t + durs[i] * 0.6);
        g.gain.linearRampToValueAtTime(0.0001, t + durs[i] * 0.95);
        const g2 = ac.createGain(); g2.gain.value = vol * 0.05;
        osc.connect(g); g.connect(out);
        osc2.connect(g2); g2.connect(out);
        osc.start(t); osc.stop(t + durs[i]);
        osc2.start(t); osc2.stop(t + durs[i]);
        nodes.push(osc, osc2, g, g2);
        t += durs[i] * 0.88;
      });
      return nodes;
    },
    musicDur: 28000
  },

  tingyu: {
    noiseName: '听雨白噪音',
    musicName: '琵琶·雨打芭蕉',
    noise: (ac, out) => {
      // 雨声：密集白噪音高频
      const len = ac.sampleRate * 3;
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * 0.22;
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1200;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 8000;
      // 雨滴打击感（低频脉冲）
      const lp2 = ac.createBiquadFilter(); lp2.type = 'lowpass'; lp2.frequency.value = 300;
      const buf2 = ac.createBuffer(1, len, ac.sampleRate);
      const d2 = buf2.getChannelData(0);
      for (let i = 0; i < len; i++) {
        const t2 = i / ac.sampleRate;
        d2[i] = Math.random() < 0.003 ? (Math.random() - 0.5) * 0.5 : 0;
      }
      const drip = ac.createBufferSource(); drip.buffer = buf2; drip.loop = true;
      drip.connect(lp2); lp2.connect(out);
      src.connect(hp); hp.connect(lp); lp.connect(out);
      src.start(); drip.start();
      return [src, hp, lp, drip, lp2];
    },
    music: (ac, out, vol) => {
      // 琵琶风格：快拨弦，F调
      const notes = [349.23, 392.00, 440.00, 466.16, 523.25, 587.33, 622.25, 698.46];
      const melody = [0,2,1,0,3,2,4,3,2,4,5,4,6,5,4,2,3,4,5,7,5,4,2,0];
      const durs =   [0.3,0.3,0.3,0.6,0.3,0.3,0.6,0.3,0.3,0.3,0.6,0.3,0.3,0.3,0.6,0.3,0.3,0.5,0.3,0.6,0.3,0.3,0.5,1.0];
      let t = ac.currentTime + 0.2;
      const nodes = [];
      melody.forEach((ni, i) => {
        const osc = ac.createOscillator(); osc.type = 'sawtooth';
        osc.frequency.value = notes[ni];
        const filt = ac.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 2000;
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol * 0.15, t + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t + durs[i] * 0.85);
        osc.connect(filt); filt.connect(g); g.connect(out);
        osc.start(t); osc.stop(t + durs[i]);
        nodes.push(osc, filt, g);
        t += durs[i];
      });
      return nodes;
    },
    musicDur: 16000
  },

  bimo: {
    noiseName: '翻书·笔尖声',
    musicName: '古筝·高山流水',
    noise: (ac, out) => {
      // 极安静：低频暖噪 + 偶尔翻书声
      const len = ac.sampleRate * 4;
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      let v = 0;
      for (let i = 0; i < len; i++) {
        v = v * 0.98 + (Math.random() - 0.5) * 0.04;
        d[i] = v;
      }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 300;
      src.connect(lp); lp.connect(out); src.start();
      return [src, lp];
    },
    music: (ac, out, vol) => {
      // 古筝：C调，平静绵长，带滑音
      const base = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25, 587.33, 659.25];
      const melody = [4,5,6,8,7,6,5,4,2,0,1,2,4,5,4,2,4,6,8,9,8,6,5,4,2,4,5,4,2,0];
      const durs =   [1.2,0.8,1.0,1.5,1.0,0.8,1.0,1.2,0.8,1.5,0.8,1.0,1.2,1.0,0.8,1.2,1.0,1.2,1.5,1.8,1.2,1.0,1.2,0.8,1.5,1.0,0.8,1.0,1.2,2.0];
      let t = ac.currentTime + 0.4;
      const nodes = [];
      melody.forEach((ni, i) => {
        const freq = base[ni];
        const osc = ac.createOscillator(); osc.type = 'triangle';
        // 滑音效果
        osc.frequency.setValueAtTime(freq * 1.02, t);
        osc.frequency.linearRampToValueAtTime(freq, t + 0.12);
        const osc2 = ac.createOscillator(); osc2.type = 'sine';
        osc2.frequency.value = freq * 2;
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol * 0.18, t + 0.06);
        g.gain.exponentialRampToValueAtTime(vol * 0.06, t + durs[i] * 0.7);
        g.gain.linearRampToValueAtTime(0.0001, t + durs[i] * 0.96);
        const g2 = ac.createGain(); g2.gain.value = vol * 0.04;
        osc.connect(g); g.connect(out);
        osc2.connect(g2); g2.connect(out);
        osc.start(t); osc.stop(t + durs[i]);
        osc2.start(t); osc2.stop(t + durs[i]);
        nodes.push(osc, osc2, g, g2);
        t += durs[i] * 0.78;
      });
      return nodes;
    },
    musicDur: 52000
  },

  lanting: {
    noiseName: '竹林风声',
    musicName: '洞箫·曲水流觞',
    noise: (ac, out) => {
      // 竹林风：中频带通，轻柔起伏
      const len = ac.sampleRate * 4;
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const d = buf.getChannelData(0);
      let v = 0;
      for (let i = 0; i < len; i++) {
        const wind = 0.5 + 0.5 * Math.sin(i / ac.sampleRate * 0.3);
        v = v * 0.94 + (Math.random() - 0.5) * 0.18 * wind;
        d[i] = v;
      }
      const src = ac.createBufferSource(); src.buffer = buf; src.loop = true;
      const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 800; bp.Q.value = 0.6;
      src.connect(bp); bp.connect(out); src.start();
      return [src, bp];
    },
    music: (ac, out, vol) => {
      // 洞箫：D调，低沉悠扬，气息感
      const scale = [293.66, 329.63, 369.99, 392.00, 440.00, 493.88, 554.37, 587.33];
      const melody = [0,2,4,3,2,4,5,4,3,5,6,5,4,3,2,4,3,2,0,2,4,5,7,6,5,4,2,0];
      const durs =   [1.5,1.0,1.8,1.2,1.0,1.5,1.8,1.2,1.0,1.5,2.0,1.5,1.2,1.0,1.5,1.2,1.0,1.5,1.8,1.2,1.5,2.0,2.2,1.5,1.2,1.5,1.8,2.5];
      let t = ac.currentTime + 0.5;
      const nodes = [];
      melody.forEach((ni, i) => {
        const freq = scale[ni];
        const osc = ac.createOscillator(); osc.type = 'sine';
        osc.frequency.value = freq;
        // 气息颤动
        const lfo = ac.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 5.2;
        const lG = ac.createGain(); lG.gain.value = freq * 0.012;
        lfo.connect(lG); lG.connect(osc.frequency);
        // 气声（噪音混合）
        const nBuf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
        const nd = nBuf.getChannelData(0);
        for(let j=0;j<nd.length;j++) nd[j]=Math.random()*2-1;
        const nSrc = ac.createBufferSource(); nSrc.buffer=nBuf; nSrc.loop=true;
        const nFilt = ac.createBiquadFilter(); nFilt.type='bandpass'; nFilt.frequency.value=freq*1.5; nFilt.Q.value=8;
        const nG = ac.createGain(); nG.gain.value = vol * 0.018;
        nSrc.connect(nFilt); nFilt.connect(nG); nG.connect(out);
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol * 0.16, t + 0.15);
        g.gain.linearRampToValueAtTime(vol * 0.12, t + durs[i] * 0.75);
        g.gain.linearRampToValueAtTime(0.0001, t + durs[i] * 0.97);
        osc.connect(g); g.connect(out);
        osc.start(t); osc.stop(t + durs[i]);
        lfo.start(t); lfo.stop(t + durs[i]);
        nSrc.start(t); nSrc.stop(t + durs[i]);
        nodes.push(osc, lfo, lG, g, nSrc, nFilt, nG);
        t += durs[i] * 0.8;
      });
      return nodes;
    },
    musicDur: 62000
  }
};

function initAudio() {
  if (aC) return;
  aC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = aC.createGain(); masterGain.gain.value = 1;
  masterGain.connect(aC.destination);
  // 混响效果（轻微）
  const convolver = aC.createConvolver();
  const irLen = aC.sampleRate * 1.5;
  const irBuf = aC.createBuffer(2, irLen, aC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.5);
  }
  convolver.buffer = irBuf;
  // reverb chain
  const revGain = aC.createGain(); revGain.gain.value = 0.18;
  convolver.connect(revGain); revGain.connect(masterGain);
  // 存到全局供音乐使用
  aC._reverb = convolver; aC._reverbGain = revGain;
}

function stopCurrentAudio() {
  [...noiseNodes, ...musicNodes].forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} });
  noiseNodes = []; musicNodes = [];
  clearTimeout(musicTimer);
}

function startNoise(id) {
  if (!aC || !aS.n) return;
  const cfg = AUDIO_CFG[id];
  if (!cfg) return;
  const g = aC.createGain(); g.gain.value = 0;
  g.connect(masterGain);
  noiseGain = g;
  const nodes = cfg.noise(aC, g);
  noiseNodes = nodes;
  g.gain.linearRampToValueAtTime(0.55, aC.currentTime + 0.8);
}

function startMusic(id) {
  if (!aC || !aS.m) return;
  const cfg = AUDIO_CFG[id];
  if (!cfg) return;
  const g = aC.createGain(); g.gain.value = 0;
  // 音乐走混响
  if (aC._reverb) g.connect(aC._reverb);
  g.connect(masterGain);
  musicGain = g;
  const nodes = cfg.music(aC, g, 1.0);
  musicNodes = nodes;
  g.gain.linearRampToValueAtTime(0.72, aC.currentTime + 1.0);
  musicTimer = setTimeout(() => { if (aS.m) startMusic(curSceneId); }, cfg.musicDur);
}

function switchSceneAudio(id) {
  curSceneId = id;
  if (!aC) return;
  // 淡出当前
  if (noiseGain) { noiseGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.8); }
  if (musicGain) { musicGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.8); }
  clearTimeout(musicTimer);
  const old = [...noiseNodes, ...musicNodes];
  noiseNodes = []; musicNodes = [];
  setTimeout(() => { old.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} }); }, 1000);
  // 淡入新场景
  setTimeout(() => {
    if (aS.n) startNoise(id);
    if (aS.m) startMusic(id);
    // 更新按钮文字
    updateAudioLabels(id);
  }, 900);
}

function updateAudioLabels(id) {
  const cfg = AUDIO_CFG[id] || {};
  const anEl = document.getElementById('an');
  const amEl = document.getElementById('am');
  if (anEl) anEl.innerHTML = `<div class="a-dot"></div>${cfg.noiseName || '自然白噪音'}`;
  if (amEl) amEl.innerHTML = `<div class="a-dot"></div>${cfg.musicName || '传统疗愈音乐'}`;
}

function togAudio(k) {
  initAudio();
  if (aC.state === 'suspended') aC.resume();
  aS[k] = !aS[k];
  document.getElementById(k === 'n' ? 'an' : 'am').classList.toggle('on', aS[k]);
  if (k === 'n') {
    if (aS.n) { startNoise(curSceneId); }
    else {
      if (noiseGain) noiseGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.6);
      setTimeout(() => { noiseNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} }); noiseNodes = []; }, 700);
    }
    toast(aS.n ? `🌿 ${AUDIO_CFG[curSceneId]?.noiseName || '自然白噪音'} 已开启` : '自然白噪音 已关闭');
  } else {
    if (aS.m) { startMusic(curSceneId); }
    else {
      clearTimeout(musicTimer);
      if (musicGain) musicGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.6);
      setTimeout(() => { musicNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} }); musicNodes = []; }, 700);
    }
    toast(aS.m ? `🎵 ${AUDIO_CFG[curSceneId]?.musicName || '传统疗愈音乐'} 已开启` : '传统疗愈音乐 已关闭');
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ════════════════════════════
   PAGE FLOW
════════════════════════════ */
const nums=['一','二','三','四','五','六'];
const sgrid=document.getElementById('sgrid');
const hsw=document.getElementById('hsw');

SCENES.forEach((s,i)=>{
  // Grid card
  const c=document.createElement('div'); c.className='s-card';
  c.innerHTML=`
    <div class="s-num">${nums[i]}</div>
    <div class="s-tag">${s.tag}</div>
    <div class="s-name">${s.name}</div>
    <div class="s-desc">${s.desc}</div>
    <div class="s-mood">· ${s.mood}</div>
    <div class="s-go">进入 →</div>`;
  c.onclick=()=>enter(s.id);
  sgrid.appendChild(c);
  // Switcher
  const b=document.createElement('button');
  b.className='sw-btn'+(i===0?' on':'');
  b.dataset.id=s.id; b.textContent=s.name;
  b.onclick=()=>enter(s.id);
  hsw.appendChild(b);
});

function goSel(){
  document.getElementById('hud').classList.remove('on');
  document.getElementById('sel').classList.add('on');
}

function enter(id){
  const s=SCENES.find(x=>x.id===id); if(!s) return;
  const ov=document.getElementById('ov');
  ov.classList.add('on');
  setTimeout(()=>{
    document.getElementById('hname').textContent=s.name;
    document.getElementById('hadp').textContent=s.mood;
    document.querySelectorAll('.sw-btn').forEach(b=>b.classList.toggle('on',b.dataset.id===id));
    // Apply per-scene brightness filter
    canvas.style.filter = s.filter || 'brightness(1.8)';
    ry=0; rx=0; vy=0; vx=0; autoRotSpeed=0.0004;
    loadSceneTex(id);
    // Switch audio to new scene
    switchSceneAudio(id);
    updateAudioLabels(id);
    document.getElementById('sel').classList.remove('on');
    document.getElementById('hud').classList.add('on');
    ov.classList.remove('on');
  },480);
}

// Breath cycle
const bStates=['缓缓吸气','屏息片刻','缓缓呼气','自然呼吸'], bDurs=[3500,1500,4500,1200];
let bI=0;
(function breath(){ document.getElementById('bst').textContent=bStates[bI]; bI=(bI+1)%4; setTimeout(breath,bDurs[bI]); })();

/* ════════════════════════════
   BOOT
════════════════════════════ */
(function boot(){
  const bar=document.getElementById('lf'); let p=0;
  // Load first scene immediately
  loadSceneTex('fuchun');
  canvas.style.filter = SCENES[0].filter || 'brightness(1.8)';
  updateAudioLabels('fuchun');
  const iv=setInterval(()=>{
    p+=12+Math.random()*18; bar.style.width=Math.min(p,95)+'%';
    if(p>=100){
      clearInterval(iv); bar.style.width='100%';
      setTimeout(()=>{
        document.getElementById('load').classList.add('out');
        setTimeout(()=>{
          document.getElementById('load').style.display='none';
          document.getElementById('sel').classList.add('on');
        },1400);
      },200);
    }
  },100);
})();
