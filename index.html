<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>疗愈空间 · 360°</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0806;font-family:'Noto Serif SC',serif}

/* ─── CANVAS ─── */
#glc{position:fixed;inset:0;width:100%;height:100%;display:block;cursor:grab;touch-action:none;}
#glc:active{cursor:grabbing}

/* ─── LOADING ─── */
#load{
  position:fixed;inset:0;z-index:300;
  background:#0a0806;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2rem;
  transition:opacity 1.4s ease;
}
#load.out{opacity:0;pointer-events:none}
.l-seal{
  width:72px;height:72px;border:1.5px solid #7a1a1a;
  display:flex;align-items:center;justify-content:center;
  font-family:'Ma Shan Zheng',cursive;font-size:1.05rem;color:#9a2a2a;
  line-height:1.5;text-align:center;
  animation:sealPulse 2.4s ease-in-out infinite;
}
@keyframes sealPulse{0%,100%{opacity:.4;transform:scale(.94)}50%{opacity:1;transform:scale(1)}}
.l-bar{width:150px;height:1px;background:rgba(180,130,70,.15);position:relative;overflow:hidden}
.l-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#a07040,#c4955a);width:0%;transition:width .3s ease}
.l-txt{font-size:.65rem;letter-spacing:.65em;color:rgba(235,220,195,.28);animation:ltFade 2s ease-in-out infinite}
@keyframes ltFade{0%,100%{opacity:.2}50%{opacity:.6}}

/* ─── SCENE SELECT ─── */
#sel{
  position:fixed;inset:0;z-index:200;
  background:rgba(8,6,4,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .8s ease;
  padding:1.5rem 1rem;
}
#sel.on{opacity:1;pointer-events:all}
.s-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:clamp(1.8rem,4vw,3.2rem);
  color:#f0e8d8;letter-spacing:.22em;text-align:center;
  text-shadow:0 0 40px rgba(196,149,90,.2);
  animation:fadeUp .9s ease both;
}
.s-sub{
  font-size:.62rem;letter-spacing:.55em;color:rgba(196,149,90,.55);
  margin:.7rem 0 2.5rem;animation:fadeUp .9s .12s ease both;text-align:center;
}
.s-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;width:min(880px,96vw);
  border:.5px solid rgba(196,149,90,.1);
  animation:fadeUp .9s .2s ease both;
}
.s-card{
  position:relative;cursor:pointer;
  padding:1.6rem 1.4rem 1.4rem;
  background:rgba(18,12,5,.82);
  border:.5px solid rgba(196,149,90,.06);
  transition:background .3s,border-color .3s;
  overflow:hidden;
}
.s-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(196,149,90,.07) 0%,transparent 55%);
  opacity:0;transition:opacity .3s;
}
.s-card:hover{background:rgba(36,24,10,.92);border-color:rgba(196,149,90,.22)}
.s-card:hover::before{opacity:1}
.s-card:hover .s-go{color:rgba(235,220,195,.7);transform:translateX(4px)}
.s-num{
  font-family:'Ma Shan Zheng',cursive;font-size:2.4rem;
  color:rgba(196,149,90,.07);position:absolute;top:.5rem;right:.9rem;
  line-height:1;transition:opacity .3s;
}
.s-card:hover .s-num{color:rgba(196,149,90,.42)}
.s-tag{font-size:.56rem;letter-spacing:.38em;color:rgba(196,149,90,.52);margin-bottom:.65rem}
.s-name{
  font-family:'ZCOOL XiaoWei',serif;font-size:1.18rem;
  color:#f0e8d8;letter-spacing:.16em;margin-bottom:.38rem;
}
.s-desc{font-size:.63rem;color:rgba(235,220,195,.34);letter-spacing:.08em;line-height:1.7}
.s-mood{
  margin-top:.8rem;padding-top:.7rem;
  border-top:.5px solid rgba(196,149,90,.1);
  font-size:.57rem;color:rgba(196,149,90,.4);letter-spacing:.18em;
}
.s-go{
  position:absolute;bottom:1rem;right:1.1rem;
  font-size:.6rem;color:rgba(235,220,195,.15);
  letter-spacing:.3em;transition:all .3s;
}

/* ─── HUD ─── */
#hud{position:fixed;inset:0;z-index:100;pointer-events:none;opacity:0;transition:opacity 1.2s ease}
#hud.on{opacity:1}

/* top */
.h-top{
  position:absolute;top:0;left:0;right:0;padding:1.5rem 2.2rem;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(0,0,0,.62) 0%,transparent 100%);
  pointer-events:all;
}
.h-back{
  display:flex;align-items:center;gap:.55rem;
  font-size:.68rem;letter-spacing:.32em;color:rgba(235,220,195,.52);
  cursor:pointer;background:none;border:none;font-family:inherit;
  transition:color .2s;
}
.h-back:hover{color:rgba(235,220,195,.92)}
.h-name{
  font-family:'ZCOOL XiaoWei',serif;font-size:1rem;
  color:rgba(235,220,195,.65);letter-spacing:.32em;
}
.h-hint{font-size:.58rem;letter-spacing:.3em;color:rgba(235,220,195,.22)}

/* breath */
.h-breath{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:16px;
  pointer-events:none;
}
.b-svg{overflow:visible}
.b-r1{animation:br1 14s ease-in-out infinite;transform-origin:center}
.b-r2{animation:br2 14s ease-in-out infinite;transform-origin:center}
.b-r3{animation:br3 14s ease-in-out infinite;transform-origin:center}
@keyframes br1{
  0%,100%{transform:scale(.9);opacity:.35}
  25%{transform:scale(1.18);opacity:.6}
  36%{transform:scale(1.18);opacity:.55}
  67%{transform:scale(.9);opacity:.35}
}
@keyframes br2{
  0%,100%{transform:scale(.82);opacity:.5}
  25%{transform:scale(1.28);opacity:.85}
  36%{transform:scale(1.28);opacity:.8}
  67%{transform:scale(.82);opacity:.5}
}
@keyframes br3{
  0%,100%{transform:scale(.72);opacity:.6;fill:rgba(240,228,200,.06)}
  25%{transform:scale(1.38);opacity:1;fill:rgba(240,228,200,.18)}
  36%{transform:scale(1.38);opacity:.95;fill:rgba(240,228,200,.15)}
  67%{transform:scale(.72);opacity:.6;fill:rgba(240,228,200,.06)}
}
.b-label{
  font-family:'Ma Shan Zheng',cursive;font-size:.85rem;
  color:rgba(240,228,200,.75);letter-spacing:.5em;
  text-shadow:0 1px 8px rgba(0,0,0,.6);
}
.b-state{
  font-size:.62rem;letter-spacing:.5em;
  color:rgba(210,180,120,.9);
  min-width:6em;text-align:center;
  text-shadow:0 1px 8px rgba(0,0,0,.7);
  transition:opacity .5s ease;
}
@keyframes bFade{0%,100%{opacity:.16}50%{opacity:.45}}

/* bottom */
.h-bot{
  position:absolute;bottom:0;left:0;right:0;
  padding:1.6rem 2.2rem 2.2rem;
  background:linear-gradient(0deg,rgba(0,0,0,.65) 0%,transparent 100%);
  pointer-events:all;
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:1rem;flex-wrap:wrap;
}
.h-audio{display:flex;gap:.7rem;align-items:center}
.a-btn{
  display:flex;align-items:center;gap:.45rem;
  padding:.4rem .92rem;cursor:pointer;
  border:.5px solid rgba(235,220,195,.15);
  background:rgba(235,220,195,.04);
  color:rgba(235,220,195,.38);
  font-family:inherit;font-size:.63rem;letter-spacing:.2em;
  transition:all .22s;border-radius:1px;
}
.a-btn:hover{background:rgba(235,220,195,.09);color:rgba(235,220,195,.72)}
.a-btn.on{
  border-color:rgba(196,149,90,.52);
  background:rgba(196,149,90,.14);
  color:rgba(235,220,195,.9);
}
.a-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.a-btn.on .a-dot{animation:dotP 1.8s ease-in-out infinite}
@keyframes dotP{0%,100%{opacity:1}50%{opacity:.2}}

/* scene switcher */
.h-sw{display:flex;gap:.45rem;flex-wrap:wrap;justify-content:center}
.sw-btn{
  padding:.28rem .7rem;font-family:inherit;font-size:.6rem;
  letter-spacing:.18em;border:.5px solid rgba(235,220,195,.13);
  background:transparent;color:rgba(235,220,195,.3);
  cursor:pointer;transition:all .2s;border-radius:1px;
}
.sw-btn:hover{border-color:rgba(235,220,195,.38);color:rgba(235,220,195,.65)}
.sw-btn.on{
  border-color:rgba(196,149,90,.55);
  color:rgba(235,220,195,.92);
  background:rgba(196,149,90,.14);
}
.h-info{text-align:right}
.h-il{font-size:.54rem;letter-spacing:.4em;color:rgba(235,220,195,.2)}
.h-iv{font-size:.68rem;color:rgba(196,149,90,.68);letter-spacing:.14em;margin-top:2px}

/* ─── OVERLAY + TOAST ─── */
#ov{position:fixed;inset:0;z-index:250;background:#0a0806;opacity:0;pointer-events:none;transition:opacity .5s ease}
#ov.on{opacity:1;pointer-events:all}
#toast{
  position:fixed;bottom:6rem;left:50%;transform:translateX(-50%);
  z-index:400;padding:.52rem 1.3rem;
  background:rgba(24,16,6,.9);border:.5px solid rgba(196,149,90,.35);
  color:rgba(235,220,195,.75);font-size:.68rem;letter-spacing:.2em;
  border-radius:2px;opacity:0;transition:opacity .4s;
  pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1}

/* ─── CUSTOM SCENE GENERATOR ─── */
#gen{
  position:fixed;inset:0;z-index:150;
  background:rgba(8,6,4,.96);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .7s ease;
  padding:2rem 1rem;
}
#gen.on{opacity:1;pointer-events:all}
.gen-title{
  font-family:'ZCOOL XiaoWei',serif;
  font-size:clamp(1.4rem,3vw,2.2rem);
  color:#f0e8d8;letter-spacing:.2em;text-align:center;margin-bottom:.6rem;
}
.gen-sub{
  font-size:.62rem;letter-spacing:.4em;color:rgba(196,149,90,.5);
  text-align:center;margin-bottom:2rem;
}
.gen-box{
  width:min(580px,92vw);
  background:rgba(20,14,6,.8);
  border:.5px solid rgba(196,149,90,.18);
  padding:2rem;
  display:flex;flex-direction:column;gap:1.2rem;
}
.gen-label{
  font-size:.62rem;letter-spacing:.38em;color:rgba(196,149,90,.55);
  margin-bottom:.5rem;
}
.gen-examples{
  display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.4rem;
}
.gen-eg{
  padding:.28rem .7rem;font-size:.6rem;letter-spacing:.15em;
  border:.5px solid rgba(196,149,90,.2);color:rgba(235,220,195,.4);
  cursor:pointer;border-radius:1px;transition:all .2s;background:transparent;
  font-family:inherit;
}
.gen-eg:hover{border-color:rgba(196,149,90,.5);color:rgba(235,220,195,.75);background:rgba(196,149,90,.08);}
textarea#ginput{
  width:100%;height:90px;padding:.9rem 1rem;
  background:rgba(10,7,3,.6);border:.5px solid rgba(196,149,90,.2);
  color:#f0e8d8;font-family:'Noto Serif SC',serif;font-size:.85rem;
  line-height:1.7;letter-spacing:.05em;resize:none;outline:none;
  transition:border-color .2s;
}
textarea#ginput:focus{border-color:rgba(196,149,90,.5);}
textarea#ginput::placeholder{color:rgba(235,220,195,.22);font-size:.78rem;}
.gen-btns{display:flex;gap:.8rem;align-items:center;}
.gen-btn{
  flex:1;padding:.75rem;
  font-family:'ZCOOL XiaoWei',serif;font-size:.9rem;letter-spacing:.25em;
  cursor:pointer;border:none;transition:all .25s;
  background:rgba(196,149,90,.18);color:rgba(235,220,195,.85);
  border:.5px solid rgba(196,149,90,.35);
}
.gen-btn:hover{background:rgba(196,149,90,.3);color:#f0e8d8;}
.gen-btn:disabled{opacity:.38;cursor:not-allowed;}
.gen-btn.cancel{
  flex:0 0 auto;padding:.75rem 1.2rem;
  background:transparent;border-color:rgba(235,220,195,.15);
  color:rgba(235,220,195,.35);font-family:'Noto Serif SC',serif;font-size:.7rem;
}
.gen-btn.cancel:hover{border-color:rgba(235,220,195,.35);color:rgba(235,220,195,.6);}
.gen-status{
  font-size:.65rem;letter-spacing:.3em;color:rgba(196,149,90,.55);
  text-align:center;min-height:1.2rem;
  display:flex;align-items:center;justify-content:center;gap:.6rem;
}
.gen-dot-ani span{
  display:inline-block;animation:dotAni 1.4s ease-in-out infinite;
  color:rgba(196,149,90,.7);
}
.gen-dot-ani span:nth-child(2){animation-delay:.2s}
.gen-dot-ani span:nth-child(3){animation-delay:.4s}
@keyframes dotAni{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* 自定义场景按钮（在选择页） */
.gen-entry{
  margin-top:1.5rem;
  padding:1.2rem 1.6rem;
  background:rgba(196,149,90,.06);
  border:.5px solid rgba(196,149,90,.2);
  cursor:pointer;transition:all .3s;
  display:flex;align-items:center;gap:1.2rem;
  width:min(860px,94vw);
}
.gen-entry:hover{background:rgba(196,149,90,.12);border-color:rgba(196,149,90,.4);}
.gen-entry-icon{
  font-family:'Ma Shan Zheng',cursive;font-size:1.8rem;
  color:rgba(196,149,90,.6);flex-shrink:0;
}
.gen-entry-text .t1{
  font-family:'ZCOOL XiaoWei',serif;font-size:1rem;
  color:rgba(235,220,195,.75);letter-spacing:.18em;
}
.gen-entry-text .t2{
  font-size:.6rem;color:rgba(196,149,90,.45);
  letter-spacing:.3em;margin-top:.3rem;
}

/* ─── VR 按钮 ─── */
#vr-btn{
  position:fixed;bottom:2rem;right:2rem;z-index:150;
  display:none;
  align-items:center;gap:.55rem;
  padding:.6rem 1.3rem;
  background:rgba(196,149,90,.15);
  border:.5px solid rgba(196,149,90,.5);
  color:rgba(240,232,216,.85);
  font-family:'Noto Serif SC',serif;font-size:.72rem;letter-spacing:.28em;
  cursor:pointer;transition:all .25s;border-radius:2px;
  backdrop-filter:blur(8px);
}
#vr-btn:hover{background:rgba(196,149,90,.3);color:#f0e8d8;border-color:rgba(196,149,90,.8);}
#vr-btn.presenting{background:rgba(139,32,32,.25);border-color:rgba(200,80,80,.6);color:rgba(240,200,200,.9);}
.vr-icon{font-size:1rem;}

/* ─── 呼吸引导 ─── */
.h-breath{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:20px;
  pointer-events:none;
}
.b-svg{overflow:visible;filter:drop-shadow(0 0 18px rgba(240,228,200,.25));}

/* 14s 完整周期：3.5s吸(25%) + 1.5s屏息(36%) + 4.5s呼(67%) + 4.5s自然 */
.b-r1{animation:br1 14s ease-in-out infinite;transform-origin:center}
.b-r2{animation:br2 14s ease-in-out infinite;transform-origin:center}
.b-r3{animation:br3 14s ease-in-out infinite;transform-origin:center}
/* 外圈：慢速参考环 */
@keyframes br1{
  0%,100%{transform:scale(.88);opacity:.28;stroke-dashoffset:0}
  25%{transform:scale(1.16);opacity:.55}
  36%{transform:scale(1.16);opacity:.50}
  67%{transform:scale(.88);opacity:.28}
}
/* 中圈：明显呼吸 */
@keyframes br2{
  0%,100%{transform:scale(.80);opacity:.45}
  25%{transform:scale(1.26);opacity:.80}
  36%{transform:scale(1.26);opacity:.75}
  67%{transform:scale(.80);opacity:.45}
}
/* 内圈：核心，最明显 */
@keyframes br3{
  0%,100%{transform:scale(.68);opacity:.55;fill:rgba(240,228,200,.08)}
  25%{transform:scale(1.36);opacity:1;fill:rgba(240,228,200,.22)}
  36%{transform:scale(1.36);opacity:.95;fill:rgba(240,228,200,.18)}
  67%{transform:scale(.68);opacity:.55;fill:rgba(240,228,200,.08)}
}
/* 光晕圈：只在吸气顶点出现 */
.b-glow{
  transform-origin:center;
  animation:bGlow 14s ease-in-out infinite;
  fill:none;
}
@keyframes bGlow{
  0%,20%,40%,100%{transform:scale(.68);opacity:0}
  25%{transform:scale(1.52);opacity:.18}
  32%{transform:scale(1.60);opacity:0}
}
.b-label{
  font-family:'Ma Shan Zheng',cursive;font-size:.9rem;
  color:rgba(240,228,200,.82);letter-spacing:.55em;
  text-shadow:0 0 20px rgba(240,228,200,.4),0 2px 8px rgba(0,0,0,.8);
}
.b-state{
  font-size:.65rem;letter-spacing:.55em;
  color:rgba(210,180,120,.95);
  min-width:8em;text-align:center;
  text-shadow:0 0 16px rgba(196,149,90,.5),0 2px 8px rgba(0,0,0,.8);
  transition:opacity .6s ease;
  font-family:'Noto Serif SC',serif;
}
/* 呼吸阶段文字的淡入淡出 */
.b-state.fade{opacity:0}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
/* ─── PLACEHOLDER CANVAS ─── */
#offC{display:none}
</style>
</head>
<body>

<div id="load">
  <div class="l-seal">静<br>心</div>
  <div class="l-bar"><div class="l-fill" id="lf"></div></div>
  <div class="l-txt">正在展开山河</div>
</div>

<div id="ov"></div>
<div id="toast"></div>

<canvas id="glc"></canvas>
<canvas id="offC" width="2048" height="1024"></canvas>

<!-- VR 进入按钮 -->
<button id="vr-btn" onclick="toggleVR()">
  <span class="vr-icon">◎</span>
  <span id="vr-txt">进入 Vision Pro</span>
</button>

<!-- 切换到真实风景版 -->
<a href="nature.html" style="position:fixed;top:1rem;right:1.5rem;z-index:300;padding:.38rem .9rem;background:rgba(80,160,90,.1);border:.5px solid rgba(80,160,90,.3);color:rgba(180,230,190,.6);font-family:'Noto Serif SC',serif;font-size:.6rem;letter-spacing:.22em;cursor:pointer;transition:all .22s;border-radius:1px;text-decoration:none;" onmouseover="this.style.background='rgba(80,160,90,.22)';this.style.color='rgba(200,240,210,.9)'" onmouseout="this.style.background='rgba(80,160,90,.1)';this.style.color='rgba(180,230,190,.6)'">🌿 真实风景版 →</a>

<!-- CUSTOM SCENE GENERATOR -->
<div id="gen">
  <p class="gen-title">创造你的水墨世界</p>
  <p class="gen-sub">用文字描绘心中的疗愈画面 · AI 为你生成专属场景</p>
  <div class="gen-box" id="gen-inner"></div>
</div>

<!-- SCENE SELECT -->
<div id="sel">
  <p class="s-title">进入疗愈场景吧</p>
  <p class="s-sub">六境 · 360° 沉浸 · 归于当下</p>
  <div class="s-grid" id="sgrid"></div>
  <div class="gen-entry" onclick="openGen()">
    <div class="gen-entry-icon">✦</div>
    <div class="gen-entry-text">
      <div class="t1">创造我的专属场景</div>
      <div class="t2">输入描述 · AI 生成水墨全景 · 沉浸其中</div>
    </div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="h-top">
    <button class="h-back" onclick="goSel()">← 返 回</button>
    <div class="h-name" id="hname">富春山居</div>
    <div class="h-hint">拖 拽 · 环 视 四 方</div>
  </div>

  <div class="h-breath">
    <svg class="b-svg" width="220" height="220" viewBox="-110 -110 220 220">
      <!-- 光晕圈：吸气顶点闪烁 -->
      <circle class="b-glow" r="88" stroke="rgba(240,228,200,.6)" stroke-width="1"/>
      <!-- 外圈：参考边界 -->
      <circle class="b-r1" r="82" fill="none" stroke="rgba(240,228,200,.55)" stroke-width="1.2"
        stroke-dasharray="8 6"/>
      <!-- 中圈 -->
      <circle class="b-r2" r="62" fill="none" stroke="rgba(240,228,200,.75)" stroke-width="1.8"/>
      <!-- 内圈：核心呼吸圈 -->
      <circle class="b-r3" r="42" fill="rgba(240,228,200,.08)" stroke="rgba(240,228,200,.95)" stroke-width="2.5"/>
    </svg>
    <div class="b-label">呼 · 吸</div>
    <div class="b-state" id="bst">缓缓吸气</div>
  </div>

  <div class="h-bot">
    <div class="h-audio">

let isDrag = false, px = 0, py = 0, vy = 0, vx = 0, ry = 0, rx = 0;
const RS = 0.0028, DAMP = 0.90, MRX = Math.PI * 0.38;
let autoRotSpeed = 0.0004;

canvas.addEventListener('mousedown', e => { isDrag=true; px=e.clientX; py=e.clientY; autoRotSpeed=0; });
window.addEventListener('mouseup', () => { isDrag=false; });
window.addEventListener('mousemove', e => {
  if (!isDrag) return;
  vy += (e.clientX - px) * RS; vx += (e.clientY - py) * RS * 0.55;
  px = e.clientX; py = e.clientY;
});
canvas.addEventListener('touchstart', e => { isDrag=true; px=e.touches[0].clientX; py=e.touches[0].clientY; autoRotSpeed=0; }, {passive:true});
window.addEventListener('touchend', () => { isDrag=false; });
window.addEventListener('touchmove', e => {
  if (!isDrag) return;
  vy += (e.touches[0].clientX - px) * RS; vx += (e.touches[0].clientY - py) * RS * 0.55;

}, {passive:true});
canvas.addEventListener('wheel', e => {
  camera.fov = Math.max(38, Math.min(100, camera.fov + e.deltaY * 0.04));
  camera.updateProjectionMatrix();
}, {passive:true});

function updateCam() {
  // VR 模式下头显自动控制视角，不需要手动更新
  if (renderer.xr.isPresenting) return;
  vy *= DAMP; vx *= DAMP;
  ry += vy + autoRotSpeed;
  rx += vx;
  rx = Math.max(-MRX, Math.min(MRX, rx));
  const qY = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), ry);
  const qX = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0), rx);
  camera.quaternion.copy(qY).multiply(qX);
}

// Render loop — 用 setAnimationLoop 支持 WebXR
const clock = new THREE.Clock();
renderer.setAnimationLoop(() => {
  clock.getDelta();
  updateCam();
  renderer.render(scene, camera);
});

const loader = new THREE.TextureLoader();
const texCache = {};

function loadSceneTex(id) {
  if (texCache[id]) {
    applyTex(texCache[id]);
    return;
  }
  // 用 fetch + blob 绕过 CORS，同时兼容本地文件
  fetch(id + '.jpg')
    .then(r => { if (!r.ok) throw new Error('not found'); return r.blob(); })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        const tex = new THREE.Texture(img);
        tex.encoding = THREE.sRGBEncoding;
        tex.wrapS = THREE.RepeatWrapping;
        tex.repeat.x = -1; tex.offset.x = 1;
        tex.needsUpdate = true;
        texCache[id] = tex;
        applyTex(tex);
      };
      img.src = url;
    })
    .catch(() => buildProceduralTex(id));
}

function applyTex(tex) {
  mat.map = tex;
  mat.needsUpdate = true;
}

function buildProceduralTex(id) {
  const seed = Array.from(id).reduce((a,c) => a + c.charCodeAt(0)*31, 0);
  const rng = mkRng(seed);
  g.clearRect(0,0,W,H);
  if (DRAWS[id]) DRAWS[id](rng);
  const tex = new THREE.CanvasTexture(offC);
  tex.needsUpdate = true;
  tex.wrapS = THREE.RepeatWrapping;
  tex.repeat.x = -1; tex.offset.x = 1;
  texCache[id] = tex;
  applyTex(tex);
}

        const nBuf = ac.createBuffer(1, ac.sampleRate * 0.1, ac.sampleRate);
        const nd = nBuf.getChannelData(0);
        for(let j=0;j<nd.length;j++) nd[j]=Math.random()*2-1;
        const nSrc = ac.createBufferSource(); nSrc.buffer=nBuf; nSrc.loop=true;
        const nFilt = ac.createBiquadFilter(); nFilt.type='bandpass'; nFilt.frequency.value=freq*1.5; nFilt.Q.value=8;
        const nG = ac.createGain(); nG.gain.value = vol * 0.018;
        nSrc.connect(nFilt); nFilt.connect(nG); nG.connect(out);
        const g = ac.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol * 0.16, t + 0.15);
        g.gain.linearRampToValueAtTime(vol * 0.12, t + durs[i] * 0.75);
        g.gain.linearRampToValueAtTime(0.0001, t + durs[i] * 0.97);
        osc.connect(g); g.connect(out);
        osc.start(t); osc.stop(t + durs[i]);
        lfo.start(t); lfo.stop(t + durs[i]);
        nSrc.start(t); nSrc.stop(t + durs[i]);
        nodes.push(osc, lfo, lG, g, nSrc, nFilt, nG);
        t += durs[i] * 0.8;
      });
      return nodes;
    },
    musicDur: 62000
  }
};

function initAudio() {
  if (aC) return;
  aC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = aC.createGain(); masterGain.gain.value = 1;
  masterGain.connect(aC.destination);
  // 混响效果（轻微）
  const convolver = aC.createConvolver();
  const irLen = aC.sampleRate * 1.5;
  const irBuf = aC.createBuffer(2, irLen, aC.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.5);
  }
  convolver.buffer = irBuf;
  // reverb chain
  const revGain = aC.createGain(); revGain.gain.value = 0.18;
  convolver.connect(revGain); revGain.connect(masterGain);
  // 存到全局供音乐使用
  aC._reverb = convolver; aC._reverbGain = revGain;
}

function stopCurrentAudio() {
  [...noiseNodes, ...musicNodes].forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} });
  noiseNodes = []; musicNodes = [];
  clearTimeout(musicTimer);
}

function startNoise(id) {
  if (!aC || !aS.n) return;
  const cfg = AUDIO_CFG[id];
  if (!cfg) return;
  const g = aC.createGain(); g.gain.value = 0;
  g.connect(masterGain);
  noiseGain = g;
  const nodes = cfg.noise(aC, g);
  noiseNodes = nodes;
  g.gain.linearRampToValueAtTime(0.55, aC.currentTime + 0.8);
}

function startMusic(id) {
  if (!aC || !aS.m) return;
  const cfg = AUDIO_CFG[id];
  if (!cfg) return;
  const g = aC.createGain(); g.gain.value = 0;
  // 音乐走混响
  if (aC._reverb) g.connect(aC._reverb);
  g.connect(masterGain);
  musicGain = g;
  const nodes = cfg.music(aC, g, 1.0);
  musicNodes = nodes;
  g.gain.linearRampToValueAtTime(0.72, aC.currentTime + 1.0);
  musicTimer = setTimeout(() => { if (aS.m) startMusic(curSceneId); }, cfg.musicDur);
}

function switchSceneAudio(id) {
  curSceneId = id;
  if (!aC) return;
  // 淡出当前
  if (noiseGain) { noiseGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.8); }
  if (musicGain) { musicGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.8); }
  clearTimeout(musicTimer);
  const old = [...noiseNodes, ...musicNodes];
  noiseNodes = []; musicNodes = [];
  setTimeout(() => { old.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} }); }, 1000);
  // 淡入新场景
  setTimeout(() => {
    if (aS.n) startNoise(id);
    if (aS.m) startMusic(id);
    // 更新按钮文字
    updateAudioLabels(id);
  }, 900);
}

function updateAudioLabels(id) {
  const cfg = AUDIO_CFG[id] || {};
  const anEl = document.getElementById('an');
  const amEl = document.getElementById('am');
  if (anEl) anEl.innerHTML = `<div class="a-dot"></div>${cfg.noiseName || '自然白噪音'}`;
  if (amEl) amEl.innerHTML = `<div class="a-dot"></div>${cfg.musicName || '传统疗愈音乐'}`;
}

function togAudio(k) {
  initAudio();
  if (aC.state === 'suspended') aC.resume();
  aS[k] = !aS[k];
  document.getElementById(k === 'n' ? 'an' : 'am').classList.toggle('on', aS[k]);
  if (k === 'n') {
    if (aS.n) { startNoise(curSceneId); }
    else {
      if (noiseGain) noiseGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.6);
      setTimeout(() => { noiseNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} }); noiseNodes = []; }, 700);
    }
    toast(aS.n ? `🌿 ${AUDIO_CFG[curSceneId]?.noiseName || '自然白噪音'} 已开启` : '自然白噪音 已关闭');
  } else {
    if (aS.m) { startMusic(curSceneId); }
    else {
      clearTimeout(musicTimer);
      if (musicGain) musicGain.gain.linearRampToValueAtTime(0, aC.currentTime + 0.6);
      setTimeout(() => { musicNodes.forEach(n => { try { n.stop ? n.stop() : n.disconnect(); } catch(e){} }); musicNodes = []; }, 700);
    }
    toast(aS.m ? `🎵 ${AUDIO_CFG[curSceneId]?.musicName || '传统疗愈音乐'} 已开启` : '传统疗愈音乐 已关闭');
  }
}

function togVoice() {
  voiceEnabled = !voiceEnabled;
  document.getElementById('av').classList.toggle('on', voiceEnabled);
  if (!voiceEnabled) { speechSynth.cancel(); }
  else { speak('语音呼吸引导已开启，请跟随引导调整呼吸'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');

}

/* ════════════════════════════
   WEBXR — Vision Pro / VR 头显支持
════════════════════════════ */
const vrBtn = document.getElementById('vr-btn');
const vrTxt = document.getElementById('vr-txt');
let xrSession = null;

// 检测设备是否支持 WebXR
async function checkXRSupport() {
  if (!navigator.xr) return;
  // immersive-vr: Quest/Pico; immersive-ar: Vision Pro 空间计算
  const modes = ['immersive-vr', 'immersive-ar'];
  for (const mode of modes) {
    try {
      const supported = await navigator.xr.isSessionSupported(mode);
      if (supported) {
        vrBtn.style.display = 'flex';
        vrBtn.dataset.mode = mode;
        // Vision Pro 用 AR 模式显示不同文字
        vrTxt.textContent = mode === 'immersive-ar' ? '进入 Vision Pro' : '进入 VR 模式';
        break;
      }
    } catch(e) {}
  }
}
checkXRSupport();

async function toggleVR() {
  if (xrSession) {
    // 已在 VR 中 → 退出
    await xrSession.end();
    return;
  }
  const mode = vrBtn.dataset.mode || 'immersive-vr';
  try {
    // 请求 XR 会话
    const sessionInit = {
      optionalFeatures: ['local-floor', 'bounded-floor', 'hand-tracking'],
    };
    // Vision Pro 的 AR 模式加上 unbounded 空间
    if (mode === 'immersive-ar') {
      sessionInit.optionalFeatures.push('unbounded');
    }
    xrSession = await navigator.xr.requestSession(mode, sessionInit);
    renderer.xr.setSession(xrSession);

    vrBtn.classList.add('presenting');
    vrTxt.textContent = '退出沉浸模式';
    // 隐藏 HUD，让画面更纯净
    document.getElementById('hud').style.opacity = '0';

    xrSession.addEventListener('end', () => {
      xrSession = null;
      vrBtn.classList.remove('presenting');
      vrTxt.textContent = mode === 'immersive-ar' ? '进入 Vision Pro' : '进入 VR 模式';
      document.getElementById('hud').style.opacity = '1';
    });
  } catch(err) {
    console.error('XR session failed:', err);
    toast('设备不支持沉浸模式，请在 Vision Pro 中打开');
  }
}

// 在场景里才显示 VR 按钮

  if (vrBtn.style.display !== 'none' || show) {
    vrBtn.style.display = show ? 'flex' : 'none';
  }
}

  zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('CN') || v.lang.includes('TW'))
         || voices.find(v => v.lang.includes('cmn'))
         || voices[0];
}

function speak(text) {
  if (!voiceEnabled || !speechSynth) return;
  speechSynth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (zhVoice) u.voice = zhVoice;
  u.lang = 'zh-CN'; u.rate = 0.78; u.pitch = 0.92; u.volume = 0.88;
  speechSynth.speak(u);
}

  }, 500);
})();

/* ════════════════════════════
   BOOT
════════════════════════════ */
(function boot(){
  const bar=document.getElementById('lf'); let p=0;
  // Load first scene immediately
  loadSceneTex('fuchun');
  canvas.style.filter = SCENES[0].filter || 'brightness(1.8)';
  updateAudioLabels('fuchun');
  const iv=setInterval(()=>{
    p+=12+Math.random()*18; bar.style.width=Math.min(p,95)+'%';
    if(p>=100){
      clearInterval(iv); bar.style.width='100%';
      setTimeout(()=>{
        document.getElementById('load').classList.add('out');
        setTimeout(()=>{
          document.getElementById('load').style.display='none';
          document.getElementById('sel').classList.add('on');
        },1400);
      },200);
    }
  },100);
})();
</script>
