<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>疗愈空间 · 360°</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1408}
:root{
  --paper:#f0e8d8;--gold:#c4955a;
  --tf:'ZCOOL XiaoWei',serif;
  --tb:'Noto Serif SC',serif;
  --tm:'Ma Shan Zheng',cursive;
}
#wrap{position:fixed;inset:0;overflow:hidden;cursor:grab;user-select:none}
#wrap:active{cursor:grabbing}
#pano{position:absolute;top:0;left:0;height:100%;image-rendering:auto}

#load{position:fixed;inset:0;z-index:200;background:#0e0c08;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.6rem;transition:opacity 1s ease}
#load.out{opacity:0;pointer-events:none}
.lseal{width:60px;height:60px;border:1.5px solid #8b2020;display:flex;align-items:center;justify-content:center;font-family:var(--tm);font-size:.95rem;color:#8b2020;text-align:center;line-height:1.4;animation:sp 2s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.4;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}
.lbar{width:130px;height:1px;background:rgba(196,149,90,.15)}
.lfill{height:1px;background:var(--gold);width:0%;transition:width .2s}
.ltxt{font-family:var(--tb);font-size:.62rem;letter-spacing:.55em;color:rgba(240,232,216,.3);animation:tf 2s ease-in-out infinite}
@keyframes tf{0%,100%{opacity:.2}50%{opacity:.6}}

#sel{position:fixed;inset:0;z-index:100;background:rgba(10,8,5,.94);backdrop-filter:blur(20px);display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .6s ease;padding:1rem}
#sel.on{opacity:1;pointer-events:all}
.sttl{font-family:var(--tf);font-size:clamp(1.6rem,3.5vw,2.8rem);color:var(--paper);letter-spacing:.2em;text-align:center}
.ssub{font-size:.6rem;letter-spacing:.5em;color:var(--gold);opacity:.5;margin:.5rem 0 2rem;text-align:center}
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;width:min(820px,94vw);border:.5px solid rgba(196,149,90,.12)}
.scard{position:relative;cursor:pointer;padding:1.4rem 1.2rem 1.2rem;background:rgba(22,15,6,.78);border:.5px solid rgba(196,149,90,.07);transition:all .28s ease;overflow:hidden}
.scard:hover{background:rgba(40,26,10,.9);border-color:rgba(196,149,90,.25)}
.scard:hover .sc-go{color:rgba(240,232,216,.7)}
.sc-num{font-family:var(--tm);font-size:2rem;color:var(--gold);opacity:.08;position:absolute;top:.5rem;right:.8rem;line-height:1;transition:opacity .3s}
.scard:hover .sc-num{opacity:.45}
.sc-tag{font-size:.56rem;letter-spacing:.35em;color:var(--gold);opacity:.5;margin-bottom:.55rem}
.sc-name{font-family:var(--tf);font-size:1.1rem;color:var(--paper);letter-spacing:.14em;margin-bottom:.3rem}
.sc-desc{font-size:.62rem;color:rgba(240,232,216,.35);letter-spacing:.07em;line-height:1.6}
.sc-mood{margin-top:.7rem;padding-top:.6rem;border-top:.5px solid rgba(196,149,90,.1);font-size:.56rem;color:rgba(196,149,90,.42);letter-spacing:.16em}
.sc-go{position:absolute;bottom:.9rem;right:1rem;font-size:.58rem;color:rgba(240,232,216,.16);letter-spacing:.3em;transition:all .25s}

#hud{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;transition:opacity .8s ease}
#hud.on{opacity:1}
.htop{position:absolute;top:0;left:0;right:0;padding:1.3rem 1.8rem;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.55) 0%,transparent 100%);pointer-events:all}
.bbk{display:flex;align-items:center;gap:.5rem;font-family:var(--tb);font-size:.65rem;letter-spacing:.3em;color:rgba(240,232,216,.5);cursor:pointer;background:none;border:none;transition:color .2s}
.bbk:hover{color:rgba(240,232,216,.9)}
.hname{font-family:var(--tf);font-size:.9rem;color:rgba(240,232,216,.6);letter-spacing:.28em}
.hhint{font-size:.58rem;letter-spacing:.28em;color:rgba(240,232,216,.2)}
.brw{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:11px;pointer-events:none}
.brsvg{overflow:visible}
.r1{animation:r1 7s ease-in-out infinite;transform-origin:center}
.r2{animation:r2 7s ease-in-out infinite;transform-origin:center}
.r3{animation:r3 7s ease-in-out infinite;transform-origin:center}
@keyframes r1{0%,100%{transform:scale(1);opacity:.1}50%{transform:scale(1.2);opacity:.2}}
@keyframes r2{0%,100%{transform:scale(1);opacity:.15}50%{transform:scale(1.25);opacity:.3}}
@keyframes r3{0%,100%{transform:scale(1);opacity:.22;fill:rgba(240,232,216,.04)}50%{transform:scale(1.3);opacity:.42;fill:rgba(240,232,216,.08)}}
.brlb{font-family:var(--tm);font-size:.7rem;color:rgba(240,232,216,.28);letter-spacing:.4em;animation:bla 7s ease-in-out infinite}
.brst{font-size:.5rem;letter-spacing:.4em;color:rgba(196,149,90,.38);animation:bla 7s 1.5s ease-in-out infinite}
@keyframes bla{0%,100%{opacity:.18}50%{opacity:.48}}
.hbot{position:absolute;bottom:0;left:0;right:0;padding:1.4rem 1.8rem 1.6rem;background:linear-gradient(0deg,rgba(0,0,0,.58) 0%,transparent 100%);pointer-events:all;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.atg{display:flex;gap:.55rem;align-items:center}
.atb{display:flex;align-items:center;gap:.4rem;padding:.35rem .8rem;cursor:pointer;border:.5px solid rgba(240,232,216,.16);background:rgba(240,232,216,.03);color:rgba(240,232,216,.38);font-family:var(--tb);font-size:.62rem;letter-spacing:.18em;transition:all .2s;border-radius:1px}
.atb:hover{background:rgba(240,232,216,.08);color:rgba(240,232,216,.7)}
.atb.on{border-color:rgba(196,149,90,.48);background:rgba(196,149,90,.12);color:rgba(240,232,216,.88)}
.atb .dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.atb.on .dot{animation:dp 1.8s ease-in-out infinite}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}
.sws{display:flex;gap:.4rem;flex-wrap:wrap;justify-content:center}
.swb{padding:.26rem .62rem;font-family:var(--tb);font-size:.58rem;letter-spacing:.16em;border:.5px solid rgba(240,232,216,.13);background:transparent;color:rgba(240,232,216,.3);cursor:pointer;transition:all .2s;border-radius:1px}
.swb:hover{border-color:rgba(240,232,216,.36);color:rgba(240,232,216,.62)}
.swb.on{border-color:rgba(196,149,90,.5);color:rgba(240,232,216,.9);background:rgba(196,149,90,.12)}
.sinf{text-align:right}
.silb{font-size:.54rem;letter-spacing:.36em;color:rgba(240,232,216,.2)}
.siv{font-family:var(--tb);font-size:.65rem;color:rgba(196,149,90,.62);letter-spacing:.13em;margin-top:2px}
#ov{position:fixed;inset:0;z-index:150;background:#0a0806;opacity:0;pointer-events:none;transition:opacity .45s ease}
#ov.on{opacity:1;pointer-events:all}
#toast{position:fixed;bottom:5rem;left:50%;transform:translateX(-50%);z-index:300;padding:.5rem 1.2rem;background:rgba(30,22,10,.85);border:.5px solid rgba(196,149,90,.3);color:rgba(240,232,216,.7);font-family:var(--tb);font-size:.68rem;letter-spacing:.2em;border-radius:2px;opacity:0;transition:opacity .4s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
</style>
</head>
<body>
<div id="load">
  <div class="lseal">静<br>心</div>
  <div class="lbar"><div class="lfill" id="lf"></div></div>
  <div class="ltxt">正在展开山河</div>
</div>
<div id="ov"></div>
<div id="toast"></div>
<div id="wrap"><canvas id="pano"></canvas></div>
<div id="sel">
  <div class="sttl">进入疗愈场景吧</div>
  <div class="ssub">六境 · 360° 沉浸 · 归于当下</div>
  <div class="sgrid" id="sgrid"></div>
</div>
<div id="hud">
  <div class="htop">
    <button class="bbk" onclick="goSel()">← 返 回</button>
    <div class="hname" id="hname">富春山居</div>
    <div class="hhint">← 拖 拽 环 视 →</div>
  </div>
  <div class="brw">
    <svg class="brsvg" width="120" height="120" viewBox="-60 -60 120 120">
      <circle class="r1" r="52" fill="none" stroke="rgba(240,232,216,.1)" stroke-width=".5"/>
      <circle class="r2" r="39" fill="none" stroke="rgba(240,232,216,.15)" stroke-width=".5"/>
      <circle class="r3" r="26" fill="rgba(240,232,216,.04)" stroke="rgba(240,232,216,.28)" stroke-width=".5"/>
    </svg>
    <div class="brlb">呼 · 吸</div>
    <div class="brst" id="bst">缓缓吸气</div>
  </div>
  <div class="hbot">
    <div class="atg">
      <div class="atb" id="an" onclick="togAudio('n')"><div class="dot"></div>自然白噪音</div>
      <div class="atb" id="am" onclick="togAudio('m')"><div class="dot"></div>传统疗愈音乐</div>
    </div>
    <div class="sws" id="sws"></div>
    <div class="sinf">
      <div class="silb">适 配 症 状</div>
      <div class="siv" id="sadp">焦虑 · 烦躁</div>
    </div>
  </div>
</div>

<script>
/* ══ CANVAS SETUP ══ */
const wrap=document.getElementById('wrap');
const pano=document.getElementById('pano');
const ctx=pano.getContext('2d');
const PW=4096,PH=2048;
pano.width=PW;pano.height=PH;

function setPanoSize(){
  const dh=window.innerHeight,dw=PW*(dh/PH);
  pano.style.height=dh+'px';pano.style.width=dw+'px';pano._dw=dw;
}
setPanoSize();
window.addEventListener('resize',()=>{setPanoSize();clampX();});

/* ── DRAG ── */
let dragging=false,startX=0,startOX=0,offsetX=0;
function clampX(){
  const max=-(pano._dw-window.innerWidth);
  offsetX=Math.max(max,Math.min(0,offsetX));
  pano.style.left=offsetX+'px';
}
wrap.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startOX=offsetX;});
window.addEventListener('mouseup',()=>{dragging=false;});
window.addEventListener('mousemove',e=>{if(!dragging)return;offsetX=startOX+(e.clientX-startX);clampX();});
wrap.addEventListener('touchstart',e=>{dragging=true;startX=e.touches[0].clientX;startOX=offsetX;},{passive:true});
window.addEventListener('touchend',()=>{dragging=false;});
window.addEventListener('touchmove',e=>{if(!dragging)return;offsetX=startOX+(e.touches[0].clientX-startX);clampX();},{passive:true});

/* ── AUTO DRIFT ── */
let driftId=null;
function startDrift(){
  if(driftId)cancelAnimationFrame(driftId);
  let last=null;
  (function tick(ts){
    if(!dragging){if(last)offsetX-=(ts-last)*0.015;clampX();}
    last=ts;driftId=requestAnimationFrame(tick);
  })();
}

/* ══ RNG ══ */
function mkRng(seed){let s=seed|0;return()=>{s=Math.imul(48271,s)|0;return(s>>>0)/2**32;};}

/* ══ DRAW HELPERS ══ */
function lg(x0,y0,x1,y1,stops){const g=ctx.createLinearGradient(x0,y0,x1,y1);stops.forEach(([t,c])=>g.addColorStop(t,c));return g;}
function rg(cx,cy,r0,r1,stops){const g=ctx.createRadialGradient(cx,cy,r0,cx,cy,r1);stops.forEach(([t,c])=>g.addColorStop(t,c));return g;}
function bl(b,fn){ctx.save();ctx.filter=`blur(${b}px)`;fn();ctx.restore();}
function ridge(rng,by,amp,freq,oct,col){
  ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(0,PH);
  for(let x=0;x<=PW;x+=4){let n=0,a=1,f=freq;for(let o=0;o<oct;o++){n+=Math.sin(x*f*Math.PI*2/PW)*a;a*=.5;f*=2.1;}ctx.lineTo(x,by+n*amp);}
  ctx.lineTo(PW,PH);ctx.closePath();ctx.fill();
}

/* ══ SCENE PAINTERS ══ */
function drawFuchun(rng){
  // 清晨水墨山水
  ctx.fillStyle=lg(0,0,0,PH,[[0,'#c5d5e5'],[.38,'#dae5ec'],[.62,'#e2ebe4'],[1,'#cac5b4']]);ctx.fillRect(0,0,PW,PH);
  // 晨光
  bl(70,()=>{ctx.fillStyle=rg(PW*.76,PH*.13,0,PW*.32,[[0,'rgba(255,240,175,.88)'],[1,'rgba(0,0,0,0)']]);ctx.fillRect(0,0,PW,PH);});
  // 五层山脉
  const mtns=[{y:.71,a:58,d:.45,c:'rgba(182,198,214,'},{y:.65,a:78,d:.64,c:'rgba(145,165,186,'},{y:.59,a:98,d:.78,c:'rgba(102,130,153,'},{y:.53,a:118,d:.9,c:'rgba(68,95,116,'},{y:.47,a:132,d:.97,c:'rgba(42,65,88,'}];
  mtns.forEach((m,i)=>{
    if(i<3)bl((3-i)*6,()=>ridge(rng,PH*m.y,m.a,1.8+i*.6,4,m.c+m.d+')'));
    else ridge(rng,PH*m.y,m.a,1.8+i*.6,4,m.c+m.d+')');
  });
  // 薄雾带
  bl(22,()=>{
    [[.63,.065],[.57,.09],[.50,.06]].forEach(([y,a])=>{
      ctx.fillStyle=lg(0,PH*(y-.03),0,PH*(y+.04),[[0,'rgba(255,255,255,0)'],[.5,`rgba(255,255,255,${a})`],[1,'rgba(255,255,255,0)']]);
      ctx.fillRect(0,PH*(y-.03),PW,PH*.07);
    });
  });
  // 江面
  ctx.fillStyle=lg(0,PH*.72,0,PH*.88,[[0,'rgba(152,178,208,0)'],[.3,'rgba(152,178,208,.8)'],[1,'rgba(122,155,186,.92)']]);ctx.fillRect(0,PH*.72,PW,PH*.18);
  for(let i=0;i<22;i++){ctx.strokeStyle=`rgba(198,215,234,${.43-i*.018})`;ctx.lineWidth=.9;ctx.beginPath();ctx.moveTo(PW*.04,PH*.756+i*7);ctx.lineTo(PW*.96,PH*.756+i*7);ctx.stroke();}
  // 山影倒映
  bl(4,()=>{ctx.save();ctx.globalAlpha=.22;ctx.scale(1,-1);ctx.translate(0,-PH*1.54);ridge(rng,PH*.50,115,1.8,4,'rgba(68,95,116,.72)');ctx.restore();ctx.globalAlpha=1;});
  // 孤舟
  const bx=PW*.33,by=PH*.797;
  ctx.fillStyle='rgba(36,24,11,.93)';
  ctx.beginPath();ctx.moveTo(bx,by-5);ctx.bezierCurveTo(bx+8,by-11,bx+56,by-11,bx+66,by-5);ctx.lineTo(bx+70,by+3);ctx.lineTo(bx-4,by+3);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(36,24,11,.82)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(bx+34,by+2);ctx.lineTo(bx+32,by-40);ctx.stroke();
  // 芦苇
  [PW*.01,PW*.78].forEach(ox=>{for(let r=0;r<26;r++){const rx=ox+rng()*PW*.2,ry=PH*.9,h=PH*(.12+rng()*.06);ctx.strokeStyle=`rgba(75,54,26,${.5+rng()*.4})`;ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(rx,ry);ctx.quadraticCurveTo(rx+(rng()*20-10),ry-h*.6,rx+(rng()*24-12),ry-h);ctx.stroke();ctx.fillStyle='rgba(85,60,26,.74)';ctx.beginPath();ctx.ellipse(rx+rng()*5-2,ry-h,3.5,12,.28,0,Math.PI*2);ctx.fill();}});
  ctx.fillStyle=lg(0,PH*.87,0,PH,[[0,'rgba(108,128,146,0)'],[1,'#788ea0']]);ctx.fillRect(0,PH*.87,PW,PH*.13);
  ctx.fillStyle=rg(PW/2,PH/2,PH*.35,PH*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.3)']]);ctx.fillRect(0,0,PW,PH);
}

function drawPine(x,baseY,h,a){
  ctx.strokeStyle=`rgba(46,32,16,${a*.9})`;ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(x,baseY);ctx.lineTo(x+4,baseY-h);ctx.stroke();
  for(let l=0;l<6;l++){
    const ly=baseY-h*(.22+l*.14),lw=h*(.36-l*.04);
    ctx.fillStyle=`rgba(32,68,36,${a*(.52+l*.07)})`;
    [[-1],[1]].forEach(([d])=>{ctx.beginPath();ctx.moveTo(x+3,ly-h*.09);ctx.bezierCurveTo(x+d*lw*.1,ly,x+d*lw,ly+h*.07,x+d*lw*1.1,ly+h*.03);ctx.bezierCurveTo(x+d*lw*.5,ly-h*.05,x+d*lw*.2,ly-h*.06,x+3,ly-h*.09);ctx.fill();});
  }
}

function drawYunshan(rng){
  ctx.fillStyle=lg(0,0,0,PH,[[0,'#dce8ec'],[.4,'#eaf2ee'],[1,'#dae4e0']]);ctx.fillRect(0,0,PW,PH);
  bl(48,()=>{for(let i=0;i<14;i++){ctx.fillStyle=`rgba(255,255,255,${.62+rng()*.3})`;ctx.beginPath();ctx.ellipse(rng()*PW,PH*(.50+rng()*.07),PW*(.2+rng()*.15),PH*(.07+rng()*.05),0,0,Math.PI*2);ctx.fill();}});
  bl(10,()=>{ridge(rng,PH*.66,72,.9,3,'rgba(152,168,178,.28)');ridge(rng,PH*.60,98,1.2,3,'rgba(118,138,152,.38)');});
  ctx.fillStyle='rgba(65,85,100,.97)';
  ctx.beginPath();ctx.moveTo(PW*.02,PH);ctx.bezierCurveTo(PW*.15,PH*.72,PW*.32,PH*.3,PW*.5,PH*.1);ctx.bezierCurveTo(PW*.58,PH*.22,PW*.68,PH*.46,PW*.82,PH*.62);ctx.bezierCurveTo(PW*.88,PH*.72,PW*.94,PH*.84,PW*.98,PH);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(65,85,100,.97)';ctx.beginPath();ctx.moveTo(0,PH);ctx.bezierCurveTo(PW*.02,PH*.84,0,PH*.72,0,PH);ctx.fill();
  bl(10,()=>{ctx.fillStyle='rgba(232,242,248,.78)';ctx.beginPath();ctx.ellipse(PW*.5,PH*.12,88,32,0,0,Math.PI*2);ctx.fill();});
  bl(22,()=>{ctx.fillStyle='rgba(255,255,255,.72)';ctx.fillRect(0,PH*.44,PW,PH*.09);ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillRect(0,PH*.55,PW,PH*.065);});
  drawPine(PW*.22,PH*.63,142,1.0);drawPine(PW*.74,PH*.65,110,.92);
  ctx.fillStyle=lg(0,PH*.83,0,PH,[[0,'rgba(145,172,145,0)'],[1,'rgba(112,145,115,.93)']]);ctx.fillRect(0,PH*.83,PW,PH*.17);
  ctx.fillStyle=rg(PW/2,PH/2,PH*.3,PH*.9,[[0,'rgba(0,0,0,0)'],[1,'rgba(0,0,0,.2)']]);ctx.fillRect(0,0,PW,PH);
}

function drawXishan(rng){
  ctx.fillStyle=lg(0,0,0,PH,[[0,'#a5c5b5'],[.4,'#b9d5c2'],[1,'#92b5a2']]);ctx.fillRect(0,0,PW,PH);
  bl(28,()=>{for(let r=0;r<10;r++){const rx=rng()*PW;ctx.fillStyle='rgba(255,248,192,.22)';ctx.beginPath();ctx.moveTo(rx,0);ctx.lineTo(rx+45,PH*.68);ctx.lineTo(rx+112,PH*.68);ctx.lineTo(rx+68,0);ctx.fill();}});
  bl(8,()=>{ridge(rng,PH*.62,88,.9,3,'rgba(78,118,92,.72)');ridge(rng,PH*.56,108,1.2,3,'rgba(55,95,72,.82)');});
  const tc=['rgba(92,150,105,','rgba(62,118,78,','rgba(38,96,55,','rgba(24,76,42,'];
  [0,1,2,3].forEach(layer=>{const cnt=14+layer*5;for(let t=0;t<cnt;t++){const tx=(t/cnt)*PW+rng()*55-27,th=PH*(.25+rng()*.13);ctx.fillStyle=tc[layer]+(.72+layer*.07)+')';ctx.beginPath();ctx.moveTo(tx,PH*(.87-layer*.04));ctx.bezierCurveTo(tx-th*.5,PH*(.87-layer*.04)-th*.4,tx-th*.4,PH*(.87-layer*.04)-th,tx,PH*(.87-layer*.04)-th);ctx.bezierCurveTo(tx+th*.4,PH*(.87-layer*.04)-th,tx+th*.5,PH*(.87-layer*.04)-th*.4,tx,PH*(.87-layer*.04));ctx.fill();}});
  ctx.fillStyle=lg(0,PH*.72,0,PH*.85,[[0,'rgba(132,190,205,0)'],[.35,'rgba(132,192,208,.88)'],[1,'rgba(102,168,190,.72)']]);ctx.beginPath();ctx.moveTo(PW*.06,PH);ctx.bezierCurveTo(PW*.22,PH*.84,PW*.38,PH*.73,PW*.52,PH*.72);ctx.bezierCurveTo(PW*.66,PH*.71,PW*.8,PH*.76,PW*.94,PH);ctx.lineTo(PW,PH);ctx.lineTo(0,PH);ctx.fill();
  for(let i=0;i<14;i++){ctx.strokeStyle=`rgba(192,226,236,${.48-i*.03})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(PW*.28+i*9,PH*.76+i*5);ctx.lineTo(PW*.74-i*9,PH*.76+i*5);ctx.stroke();}
  ctx.fillStyle='rgba(92,75,55,.92)';ctx.beginPath();ctx.ellipse(PW*.52,PH*.74,PW*.055,PH*.016,0,0,Math.PI*2);ctx.fill();

/* ══ WEB AUDIO ══ */
let aC=null,nGain=null,mGain=null;
const aS={n:false,m:false};
let mLoopTimer=null;

function initAudio(){
  if(aC)return;
  aC=new(window.AudioContext||window.webkitAudioContext)();
  // 白噪音(低通→流水)
  const len=aC.sampleRate*3,buf=aC.createBuffer(2,len,aC.sampleRate);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*.32;}
  const lp=aC.createBiquadFilter();lp.type='lowpass';lp.frequency.value=500;lp.Q.value=.6;
  nGain=aC.createGain();nGain.gain.value=0;
  const ns=aC.createBufferSource();ns.buffer=buf;ns.loop=true;
  ns.connect(lp);lp.connect(nGain);nGain.connect(aC.destination);ns.start();
  // 音乐增益
  mGain=aC.createGain();mGain.gain.value=0;mGain.connect(aC.destination);
}

function playMusicSeq(){
  if(!aC||!mGain||!aS.m)return;
  const scale=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25];
  const pattern=[0,2,4,5,2,4,1,3,5,4,2,0,4,3,1,2];
  let t=aC.currentTime+.08;
  const dur=2.0;
  pattern.forEach((ni,i)=>{
    const freq=scale[ni%scale.length];
    const osc=aC.createOscillator(),g=aC.createGain();
    osc.type='sine';osc.frequency.value=freq;
    g.gain.setValueAtTime(0,t+i*dur);
    g.gain.linearRampToValueAtTime(.2,t+i*dur+.1);
    g.gain.linearRampToValueAtTime(.16,t+i*dur+dur*.65);
    g.gain.linearRampToValueAtTime(0,t+i*dur+dur*.95);
    osc.connect(g);g.connect(mGain);
    osc.start(t+i*dur);osc.stop(t+i*dur+dur);
  });
  mLoopTimer=setTimeout(()=>{if(aS.m)playMusicSeq();},pattern.length*dur*1000+400);
}

function togAudio(k){
  initAudio();
  if(aC.state==='suspended')aC.resume();
  aS[k]=!aS[k];
  document.getElementById(k==='n'?'an':'am').classList.toggle('on',aS[k]);
  const gain=k==='n'?nGain:mGain;
  if(gain){gain.gain.cancelScheduledValues(aC.currentTime);gain.gain.linearRampToValueAtTime(aS[k]?.52:0,aC.currentTime+.6);}
  if(k==='m'){if(aS.m)playMusicSeq();else{clearTimeout(mLoopTimer);}}
  const msg=k==='n'?(aS.n?'🌊 自然白噪音 已开启':'自然白噪音 已关闭'):(aS.m?'🎵 传统疗愈音乐 已开启':'传统疗愈音乐 已关闭');
  showToast(msg);
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2400);}

/* ══ SCENE LOAD ══ */
let curId='fuchun';
const cache={};

function loadScene(id){
  const s=SCENES.find(x=>x.id===id);if(!s)return;
  curId=id;
  document.getElementById('hname').textContent=s.name;
  document.getElementById('sadp').textContent=s.mood;
  document.querySelectorAll('.swb').forEach(b=>b.classList.toggle('on',b.dataset.id===id));
  offsetX=0;clampX();
  // Draw procedural immediately
  const seed=Array.from(id).reduce((a,c)=>a+c.charCodeAt(0)*31,0);
  s.draw(mkRng(seed));
  // Try real image
  const img=new Image();
  img.onload=()=>{ctx.clearRect(0,0,PW,PH);ctx.drawImage(img,0,0,PW,PH);};
  img.src=s.img;
  startDrift();
}
